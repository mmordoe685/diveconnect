name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build + Test (JDK 17)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: diveconnect_db
          MYSQL_USER: diveconnect_user
          MYSQL_PASSWORD: DiveConnect2025!
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verificar pom.xml
        run: ./mvnw -B -q help:evaluate -Dexpression=project.version -q -DforceStdout

      - name: Compilar
        run: ./mvnw -B -q compile

      - name: Tests unitarios
        run: ./mvnw -B test
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/diveconnect_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          DB_USERNAME: diveconnect_user
          DB_PASSWORD: DiveConnect2025!
          JWT_SECRET: TestSecretKeyForCIThatIsLongEnoughToBeSecureXX

      - name: Subir reportes de tests como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Empaquetar JAR
        run: ./mvnw -B -q -DskipTests package

      - name: Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: diveconnect-jar
          path: target/diveconnect-*.jar
          retention-days: 7

  docker-build:
    name: Docker build (sólo en master)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de la imagen (sin push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: diveconnect:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
