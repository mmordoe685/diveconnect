# render.yaml - Blueprint de despliegue para Render.com
#
# Como desplegar:
#   1. Forkear el repo en GitHub.
#   2. En render.com -> "New +" -> "Blueprint" -> conectar este repo.
#   3. Render crea el servicio web Docker de Spring Boot.
#   4. Configurar manualmente las variables marcadas con sync:false:
#      MySQL externo, Stripe, PayPal, Google y OpenWeatherMap.
#   5. La app queda en https://diveconnect.onrender.com con SSL gestionado.
#
# Nota: este blueprint no provisiona base de datos. DiveConnect usa MySQL,
# por lo que SPRING_DATASOURCE_URL debe apuntar a una instancia MySQL externa.

services:
  - type: web
    name: diveconnect
    runtime: docker
    plan: free
    region: frankfurt
    branch: master
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://diveconnect.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://diveconnect.onrender.com
      - key: JPA_DDL_AUTO
        value: update
      - key: JPA_SHOW_SQL
        value: "false"
      - key: APP_LOG_LEVEL
        value: INFO
      - key: HIBERNATE_SQL_LOG_LEVEL
        value: WARN
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_ENABLED
        value: "false"
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: JAVA_OPTS
        value: "-Xms256m -Xmx450m -XX:+UseG1GC"
