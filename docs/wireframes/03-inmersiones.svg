<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" font-family="-apple-system, sans-serif">
  <title>DiveConnect - Wireframe Inmersiones (móvil)</title>
  <desc>Wireframe del catálogo de inmersiones con filtros, vista móvil 375px.</desc>

  <!-- Marco -->
  <rect x="280" y="40" width="240" height="1020" rx="32" fill="#fff" stroke="#1A1A2E" stroke-width="3"/>
  <rect x="370" y="62" width="60" height="6" rx="3" fill="#1A1A2E"/>

  <!-- Topbar -->
  <rect x="290" y="90" width="220" height="50" fill="#FFFBF5"/>
  <line x1="290" y1="140" x2="510" y2="140" stroke="#E8E3DC"/>
  <text x="320" y="120" font-size="14" font-weight="700" fill="#1A1A2E">DiveConnect</text>

  <!-- Hero -->
  <text x="305" y="170" font-size="9" font-weight="700" fill="#00D4AA" letter-spacing="2">EXPERIENCIAS DE BUCEO</text>
  <text x="305" y="195" font-size="18" font-weight="700" fill="#1A1A2E" font-family="Georgia, serif">Inmersiones</text>
  <text x="305" y="215" font-size="18" font-weight="700" fill="#1A1A2E" font-family="Georgia, serif">disponibles</text>
  <rect x="426" y="200" width="40" height="14" rx="7" fill="#DCF3EE"/>
  <text x="446" y="210" text-anchor="middle" font-size="9" font-weight="700" fill="#00D4AA">11</text>
  <text x="305" y="235" font-size="9" fill="#4A5568">Encuentra y reserva tu próxima aventura.</text>

  <!-- Filtros -->
  <rect x="305" y="255" width="190" height="32" rx="8" fill="#fff" stroke="#E8E3DC"/>
  <circle cx="320" cy="271" r="7" fill="none" stroke="#A0AEC0" stroke-width="1.5"/>
  <text x="335" y="276" font-size="10" fill="#A0AEC0">Buscar por nombre, lugar...</text>

  <g transform="translate(305, 300)">
    <text x="0" y="8" font-size="8" font-weight="700" fill="#4A5568" letter-spacing="1.5">NIVEL</text>
    <rect x="40" y="0" width="80" height="22" rx="6" fill="#fff" stroke="#E8E3DC"/>
    <text x="48" y="14" font-size="9" fill="#1A1A2E">Todos los niveles</text>
    <text x="125" y="8" font-size="8" font-weight="700" fill="#4A5568" letter-spacing="1.5">€</text>
    <rect x="135" y="0" width="55" height="22" rx="6" fill="#fff" stroke="#E8E3DC"/>
    <text x="143" y="14" font-size="9" fill="#1A1A2E">Mín-Max</text>
  </g>

  <!-- Resultados -->
  <text x="305" y="350" font-size="9" font-weight="700" fill="#1A1A2E">11 inmersiones</text>

  <!-- Card 1 -->
  <g transform="translate(300, 365)">
    <rect x="0" y="0" width="200" height="170" rx="14" fill="#fff" stroke="#E8E3DC"/>
    <rect x="0" y="0" width="200" height="90" fill="#1B4965"/>
    <rect x="10" y="10" width="60" height="16" rx="8" fill="rgba(255,255,255,.85)"/>
    <text x="40" y="21" text-anchor="middle" font-size="8" font-weight="700" fill="#1A1A2E">SIN EXPERIENCIA</text>
    <circle cx="100" cy="55" r="20" fill="#62B6CB" opacity=".6"/>
    <text x="100" y="59" text-anchor="middle" font-size="9" fill="#fff">[foto submarina]</text>
    <text x="12" y="110" font-size="11" font-weight="700" fill="#1A1A2E">Snorkel + Bautizo</text>
    <text x="12" y="125" font-size="8" fill="#A0AEC0">Blue World Diving · Alicante</text>
    <text x="12" y="142" font-size="9" fill="#4A5568">4m · 120 min · 4 plazas</text>
    <text x="12" y="160" font-size="14" font-weight="700" fill="#00D4AA" font-family="Georgia, serif">45,00 €</text>
    <rect x="135" y="148" width="55" height="16" rx="8" fill="#00D4AA"/>
    <text x="162" y="159" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Reservar</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(300, 555)">
    <rect x="0" y="0" width="200" height="170" rx="14" fill="#fff" stroke="#E8E3DC"/>
    <rect x="0" y="0" width="200" height="90" fill="#0E4D64"/>
    <rect x="10" y="10" width="55" height="16" rx="8" fill="rgba(255,209,102,.95)"/>
    <text x="37" y="21" text-anchor="middle" font-size="8" font-weight="700" fill="#1A1A2E">OPEN WATER</text>
    <text x="100" y="55" text-anchor="middle" font-size="9" fill="#fff">[foto Islas Medas]</text>
    <text x="12" y="110" font-size="11" font-weight="700" fill="#1A1A2E">Islas Medas - 2 inm.</text>
    <text x="12" y="125" font-size="8" fill="#A0AEC0">Ocean Dive Center · Palamós</text>
    <text x="12" y="142" font-size="9" fill="#4A5568">22m · 240 min · 6 plazas</text>
    <text x="12" y="160" font-size="14" font-weight="700" fill="#00D4AA" font-family="Georgia, serif">85,00 €</text>
    <rect x="135" y="148" width="55" height="16" rx="8" fill="#00D4AA"/>
    <text x="162" y="159" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Reservar</text>
  </g>

  <!-- Indicador scroll -->
  <text x="400" y="755" text-anchor="middle" font-size="9" fill="#A0AEC0">↓ más resultados</text>

  <!-- Bottom dock -->
  <rect x="290" y="990" width="220" height="60" fill="#FFFBF5"/>
  <line x1="290" y1="990" x2="510" y2="990" stroke="#E8E3DC"/>
  <g transform="translate(310, 1010)">
    <circle cx="11" cy="11" r="9" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <text x="11" y="36" text-anchor="middle" font-size="8" fill="#4A5568">Inicio</text>
    <circle cx="55" cy="11" r="9" fill="#00D4AA" opacity=".3"/>
    <text x="55" y="36" text-anchor="middle" font-size="8" font-weight="700" fill="#00D4AA">Buscar</text>
    <rect x="89" y="2" width="22" height="18" rx="6" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <text x="100" y="36" text-anchor="middle" font-size="8" fill="#4A5568">Crear</text>
    <rect x="135" y="2" width="22" height="18" rx="2" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <text x="146" y="36" text-anchor="middle" font-size="8" fill="#4A5568">Mapa</text>
    <circle cx="180" cy="11" r="9" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <text x="180" y="36" text-anchor="middle" font-size="8" fill="#4A5568">Perfil</text>
  </g>

  <text x="400" y="1080" text-anchor="middle" font-size="10" fill="#A0AEC0">Wireframe 03 · Inmersiones · Mobile 375px · DiveConnect</text>
</svg>
