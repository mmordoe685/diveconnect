<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" font-family="-apple-system, sans-serif">
  <title>DiveConnect - Wireframe Feed (móvil)</title>
  <desc>Wireframe del feed cronológico con stories y publicaciones, vista móvil 375px.</desc>

  <!-- Marco -->
  <rect x="280" y="40" width="240" height="1020" rx="32" fill="#fff" stroke="#1A1A2E" stroke-width="3"/>
  <rect x="370" y="62" width="60" height="6" rx="3" fill="#1A1A2E"/>

  <!-- Topbar -->
  <rect x="290" y="90" width="220" height="50" fill="#FFFBF5"/>
  <line x1="290" y1="140" x2="510" y2="140" stroke="#E8E3DC"/>
  <text x="320" y="120" font-size="14" font-weight="700" fill="#1A1A2E">DiveConnect</text>
  <circle cx="465" cy="115" r="9" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
  <circle cx="475" cy="105" r="6" fill="#FF6B6B"/>
  <text x="475" y="109" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">2</text>
  <rect x="490" y="108" width="14" height="14" rx="2" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>

  <!-- "Hola, sofia_buceo" -->
  <text x="305" y="170" font-size="16" font-weight="700" fill="#1A1A2E" font-family="Georgia, serif">Hola, sofia_buceo</text>
  <text x="305" y="186" font-size="10" fill="#4A5568">Descubre lo que la comunidad...</text>

  <!-- Stories -->
  <g transform="translate(300, 200)">
    <rect x="0" y="0" width="200" height="78" rx="14" fill="#DCF3EE"/>
    <!-- Tu historia -->
    <circle cx="22" cy="32" r="20" fill="none" stroke="#00D4AA" stroke-width="2"/>
    <text x="22" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#00D4AA">SG</text>
    <circle cx="34" cy="46" r="6" fill="#00D4AA"/>
    <text x="34" y="50" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">+</text>
    <text x="22" y="68" text-anchor="middle" font-size="8" fill="#1A1A2E">Tu historia</text>
    <!-- Otras stories -->
    <circle cx="70" cy="32" r="20" fill="none" stroke="url(#storyRing)" stroke-width="2"/>
    <text x="70" y="36" text-anchor="middle" font-size="10" fill="#4A5568">JT</text>
    <circle cx="115" cy="32" r="20" fill="none" stroke="url(#storyRing)" stroke-width="2"/>
    <text x="115" y="36" text-anchor="middle" font-size="10" fill="#4A5568">CM</text>
    <circle cx="160" cy="32" r="20" fill="none" stroke="#D4CFC7" stroke-width="2"/>
    <text x="160" y="36" text-anchor="middle" font-size="10" fill="#4A5568">ML</text>
  </g>
  <defs>
    <linearGradient id="storyRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="50%" stop-color="#5B5EA6"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>

  <!-- Post 1 -->
  <g transform="translate(300, 305)">
    <rect x="0" y="0" width="200" height="240" rx="14" fill="#fff" stroke="#E8E3DC"/>
    <!-- Head -->
    <circle cx="22" cy="22" r="13" fill="#62B6CB"/>
    <text x="22" y="26" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">SO</text>
    <text x="44" y="20" font-size="11" font-weight="700" fill="#1A1A2E">sofia_buceo</text>
    <text x="44" y="32" font-size="9" fill="#A0AEC0">Cabo de Creus · 12 m</text>
    <!-- Imagen -->
    <rect x="0" y="50" width="200" height="120" fill="#62B6CB"/>
    <circle cx="100" cy="110" r="30" fill="#1B4965" opacity=".5"/>
    <text x="100" y="115" text-anchor="middle" font-size="10" fill="#fff">[foto inmersión]</text>
    <!-- Acciones -->
    <g transform="translate(12, 188)">
      <path d="M0 0 L8 -8 L16 0 L8 6 Z" fill="#FF6B6B"/>
      <text x="22" y="4" font-size="10" font-weight="700" fill="#1A1A2E">24</text>
      <circle cx="55" cy="0" r="7" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
      <text x="68" y="4" font-size="10" font-weight="700" fill="#1A1A2E">5</text>
      <circle cx="170" cy="0" r="7" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    </g>
    <!-- Caption -->
    <text x="12" y="220" font-size="9" fill="#1A1A2E">"Inmersión perfecta a 18m. Visibilidad..."</text>
  </g>

  <!-- Bottom dock -->
  <rect x="290" y="980" width="220" height="60" fill="#FFFBF5"/>
  <line x1="290" y1="980" x2="510" y2="980" stroke="#E8E3DC"/>
  <g transform="translate(310, 1000)">
    <rect x="0" y="0" width="22" height="22" rx="4" fill="#00D4AA" opacity=".3"/>
    <rect x="6" y="6" width="10" height="10" fill="#00D4AA"/>
    <text x="11" y="36" text-anchor="middle" font-size="8" fill="#00D4AA" font-weight="700">Inicio</text>

    <circle cx="55" cy="11" r="9" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <text x="55" y="36" text-anchor="middle" font-size="8" fill="#4A5568">Buscar</text>

    <rect x="89" y="0" width="22" height="22" rx="6" fill="none" stroke="#00D4AA" stroke-width="2"/>
    <line x1="100" y1="6" x2="100" y2="16" stroke="#00D4AA" stroke-width="2"/>
    <line x1="95" y1="11" x2="105" y2="11" stroke="#00D4AA" stroke-width="2"/>
    <text x="100" y="36" text-anchor="middle" font-size="8" fill="#00D4AA" font-weight="700">Crear</text>

    <rect x="135" y="2" width="22" height="18" rx="2" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <text x="146" y="36" text-anchor="middle" font-size="8" fill="#4A5568">Mapa</text>

    <circle cx="180" cy="11" r="9" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <text x="180" y="36" text-anchor="middle" font-size="8" fill="#4A5568">Perfil</text>
  </g>

  <text x="400" y="1080" text-anchor="middle" font-size="10" fill="#A0AEC0">Wireframe 02 · Feed · Mobile 375px · DiveConnect</text>
</svg>
