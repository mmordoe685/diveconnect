<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" font-family="-apple-system, sans-serif">
  <title>DiveConnect - Wireframe Modal de Pago (móvil)</title>
  <desc>Wireframe del modal de pago como bottom sheet, vista móvil 375px.</desc>

  <!-- Marco -->
  <rect x="280" y="40" width="240" height="1020" rx="32" fill="#fff" stroke="#1A1A2E" stroke-width="3"/>
  <rect x="370" y="62" width="60" height="6" rx="3" fill="#1A1A2E"/>

  <!-- Topbar (semi-oscurecida por overlay) -->
  <rect x="290" y="90" width="220" height="50" fill="#FFFBF5" opacity=".4"/>
  <text x="320" y="120" font-size="14" font-weight="700" fill="#1A1A2E" opacity=".4">DiveConnect</text>

  <!-- Página detrás (oscurecida) -->
  <rect x="290" y="140" width="220" height="500" fill="rgba(11,26,43,.45)"/>

  <!-- Bottom sheet -->
  <g transform="translate(290, 400)">
    <path d="M0 24 Q0 0 24 0 L196 0 Q220 0 220 24 L220 660 L0 660 Z" fill="#fff"/>

    <!-- Handle -->
    <rect x="100" y="10" width="20" height="3" rx="2" fill="#D4CFC7"/>

    <!-- Header -->
    <text x="20" y="38" font-size="14" font-weight="700" fill="#1A1A2E" font-family="Georgia, serif">Pago seguro</text>
    <text x="200" y="40" text-anchor="end" font-size="14" fill="#4A5568">×</text>

    <line x1="0" y1="50" x2="220" y2="50" stroke="#E8E3DC"/>

    <!-- Resumen -->
    <rect x="20" y="65" width="180" height="68" rx="10" fill="#FFFBF5" stroke="#FCE8C5"/>
    <text x="32" y="85" font-size="8" font-weight="700" fill="#4A5568" letter-spacing="1.5">SNORKEL + BAUTIZO</text>
    <rect x="135" y="76" width="58" height="14" rx="7" fill="#F5A623" opacity=".25"/>
    <text x="164" y="86" text-anchor="middle" font-size="8" font-weight="700" fill="#9a7300">TFG · DEMO</text>
    <text x="32" y="115" font-size="9" fill="#4A5568">Total a pagar</text>
    <text x="190" y="118" text-anchor="end" font-size="18" font-weight="700" fill="#1A1A2E" font-family="Georgia, serif">45,00 €</text>

    <!-- Tabs Tarjeta / PayPal -->
    <g transform="translate(20, 150)">
      <rect x="0" y="0" width="85" height="28" rx="8" fill="#fff" stroke="#00D4AA" stroke-width="2"/>
      <rect x="6" y="6" width="20" height="14" rx="2" fill="#00D4AA" opacity=".3"/>
      <text x="55" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#00D4AA">Tarjeta</text>

      <rect x="95" y="0" width="85" height="28" rx="8" fill="#fff" stroke="#E8E3DC" opacity=".5"/>
      <text x="135" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#A0AEC0">PayPal</text>
    </g>

    <!-- Form tarjeta -->
    <g transform="translate(20, 195)">
      <text x="0" y="-2" font-size="8" font-weight="700" fill="#4A5568" letter-spacing="1">TITULAR</text>
      <rect x="0" y="5" width="180" height="28" rx="6" fill="#fff" stroke="#E8E3DC"/>
      <text x="10" y="22" font-size="10" fill="#A0AEC0">Nombre y apellidos</text>

      <text x="0" y="55" font-size="8" font-weight="700" fill="#4A5568" letter-spacing="1">NÚMERO</text>
      <rect x="0" y="62" width="180" height="28" rx="6" fill="#fff" stroke="#E8E3DC"/>
      <text x="10" y="79" font-size="10" fill="#A0AEC0">1234 5678 9012 3456</text>
      <rect x="155" y="69" width="20" height="14" rx="2" fill="none" stroke="#62B6CB"/>

      <text x="0" y="110" font-size="8" font-weight="700" fill="#4A5568" letter-spacing="1">CADUCIDAD</text>
      <rect x="0" y="117" width="85" height="28" rx="6" fill="#fff" stroke="#E8E3DC"/>
      <text x="10" y="134" font-size="10" fill="#A0AEC0">MM/AA</text>

      <text x="100" y="110" font-size="8" font-weight="700" fill="#4A5568" letter-spacing="1">CVC</text>
      <rect x="100" y="117" width="80" height="28" rx="6" fill="#fff" stroke="#E8E3DC"/>
      <text x="110" y="134" font-size="10" fill="#A0AEC0">123</text>
    </g>

    <!-- Botón Pagar -->
    <g transform="translate(20, 380)">
      <rect x="0" y="0" width="180" height="40" rx="10" fill="url(#tealGrad)"/>
      <circle cx="20" cy="20" r="6" fill="none" stroke="#fff" stroke-width="1.5"/>
      <rect x="16" y="20" width="8" height="6" rx="1" fill="#fff"/>
      <text x="100" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Pagar 45,00 €</text>
    </g>

    <!-- Aviso modo demo -->
    <rect x="20" y="445" width="180" height="56" rx="8" fill="#F5F0EA"/>
    <circle cx="32" cy="468" r="5" fill="none" stroke="#A0AEC0" stroke-width="1.2"/>
    <rect x="29" y="467" width="6" height="4" rx="1" fill="#A0AEC0"/>
    <text x="42" y="468" font-size="9" fill="#4A5568">Pasarela en </text>
    <text x="80" y="468" font-size="9" font-weight="700" fill="#1A1A2E">modo demo TFG</text>
    <text x="42" y="481" font-size="9" fill="#4A5568">Tarjeta de prueba 4242 4242 4242</text>
    <text x="42" y="493" font-size="9" fill="#4A5568">4242, fecha futura, cualquier CVC.</text>
  </g>

  <defs>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#1B9AAA"/>
    </linearGradient>
  </defs>

  <text x="400" y="1080" text-anchor="middle" font-size="10" fill="#A0AEC0">Wireframe 04 · Modal de pago (bottom sheet) · Mobile 375px · DiveConnect</text>
</svg>
