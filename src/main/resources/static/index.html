<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiveConnect — Red social de submarinismo</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('token')) window.location.href = '/pages/feed.html';
    });
  </script>
</head>
<body>
  <div class="landing-container">

    <div class="landing-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
      </svg>
      Red social · Est. 2026
    </div>

    <h1>Dive<span>Connect</span></h1>

    <p>
      Conecta con la comunidad de submarinistas. Comparte tus inmersiones,
      descubre nuevos lugares y reserva con los mejores centros de buceo.
    </p>

    <div class="landing-buttons">
      <a href="/pages/login.html" class="btn btn-primary btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Iniciar Sesión
      </a>
      <a href="/pages/register.html" class="btn btn-outline btn-lg"
         style="border-color:rgba(255,255,255,.5);color:var(--white);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        Crear Cuenta
      </a>
    </div>

    <div class="landing-features">
      <div class="landing-feature">
        <span>🤿</span>
        <span>Comparte inmersiones</span>
      </div>
      <div class="landing-feature">
        <span>🗺️</span>
        <span>Descubre spots</span>
      </div>
      <div class="landing-feature">
        <span>🏫</span>
        <span>Reserva centros</span>
      </div>
      <div class="landing-feature">
        <span>🐠</span>
        <span>Comunidad buceadora</span>
      </div>
    </div>

    <!-- Ola SVG animada -->
    <div class="landing-wave">
      <svg viewBox="0 0 1440 100" preserveAspectRatio="none"
           style="width:100%;height:80px;display:block;">
        <path fill="rgba(144,224,239,0.15)"
          d="M0,40 C360,80 720,0 1080,50 C1260,75 1380,30 1440,40 L1440,100 L0,100 Z">
          <animate attributeName="d" dur="8s" repeatCount="indefinite"
            values="
              M0,40 C360,80 720,0 1080,50 C1260,75 1380,30 1440,40 L1440,100 L0,100 Z;
              M0,55 C300,20 720,70 1080,35 C1260,18 1380,60 1440,50 L1440,100 L0,100 Z;
              M0,40 C360,80 720,0 1080,50 C1260,75 1380,30 1440,40 L1440,100 L0,100 Z"/>
        </path>
        <path fill="rgba(72,202,228,0.10)"
          d="M0,60 C400,30 800,80 1200,50 C1320,38 1400,55 1440,60 L1440,100 L0,100 Z">
          <animate attributeName="d" dur="11s" repeatCount="indefinite"
            values="
              M0,60 C400,30 800,80 1200,50 C1320,38 1400,55 1440,60 L1440,100 L0,100 Z;
              M0,45 C350,75 750,25 1150,65 C1300,80 1400,40 1440,45 L1440,100 L0,100 Z;
              M0,60 C400,30 800,80 1200,50 C1320,38 1400,55 1440,60 L1440,100 L0,100 Z"/>
        </path>
      </svg>
    </div>

  </div>
</body>
</html>
