<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - DiveConnect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">

        <div class="auth-logo">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none"
                 stroke="var(--ocean-600)" stroke-width="2" stroke-linecap="round">
                <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
            <h1 class="auth-title">Únete a DiveConnect</h1>
            <p style="color:var(--gray-500)">Conecta con la comunidad de buzos</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label class="form-label">Nombre de usuario</label>
                <input id="username" class="form-input" type="text"
                       placeholder="mi_usuario" required minlength="3" autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input id="email" class="form-input" type="email"
                       placeholder="correo@ejemplo.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input id="password" class="form-input" type="password"
                       placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label">Confirmar contraseña</label>
                <input id="confirmPassword" class="form-input" type="password"
                       placeholder="Repite la contraseña" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary w-full">
                Crear Cuenta
            </button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes cuenta?
            <a href="/pages/login.html">Inicia sesión aquí</a>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    redirectIfAuthenticated();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirmPassword').value;

        if (password !== confirm) {
            showAlert('Las contraseñas no coinciden', 'error');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Creando cuenta...';

        try {
            await registrarUsuario({
                username:    document.getElementById('username').value.trim(),
                email:       document.getElementById('email').value.trim(),
                password:    password,
                tipoUsuario: 'USUARIO_COMUN'
            });
            showAlert('¡Cuenta creada! Redirigiendo al login...', 'success');
            setTimeout(() => window.location.href = '/pages/login.html', 2000);
        } catch (err) {
            showAlert(err.message || 'Error al registrarse', 'error');
            btn.disabled = false;
            btn.textContent = 'Crear Cuenta';
        }
    });
</script>
</body>
</html>
