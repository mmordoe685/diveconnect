<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas - DiveConnect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">
        <a href="/pages/feed.html" class="navbar-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
            <span>DiveConnect</span>
        </a>
        <ul class="navbar-menu">
            <li><a href="/pages/feed.html">Feed</a></li>
            <li><a href="/pages/Inmersiones.html">Inmersiones</a></li>
            <li><a href="/pages/centros.html">Centros</a></li>
            <li><a href="/pages/reservas.html" class="active">Mis Reservas</a></li>
            <li><a href="/pages/Perfil.html">Mi Perfil</a></li>
            <li class="navbar-user">
                <span id="navUsername"></span>
                <button class="btn btn-sm btn-secondary" onclick="logout()">Salir</button>
            </li>
        </ul>
    </div>
</nav>

<!-- Modal de confirmación de cancelación -->
<div id="modalCancelar" style="display:none;position:fixed;inset:0;
     background:rgba(0,0,0,0.55);z-index:9999;
     justify-content:center;align-items:center;padding:1rem">
    <div style="background:white;border-radius:16px;padding:2rem;
                max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
        <h3 style="color:var(--ocean-800);margin-bottom:.5rem;font-size:1.2rem">
            ¿Cancelar esta reserva?</h3>
        <p style="color:var(--gray-600);margin-bottom:1.5rem;font-size:.95rem">
            Esta acción no se puede deshacer. Las plazas quedarán liberadas
            para otros usuarios.</p>
        <div style="display:flex;gap:.75rem;justify-content:flex-end">
            <button class="btn btn-secondary"
                onclick="cerrarModal()">Mantener reserva</button>
            <button class="btn btn-danger" id="btnConfirmarCancelar"
                onclick="confirmarCancelacion()">Sí, cancelar</button>
        </div>
    </div>
</div>

<div class="container">
    <h2 style="color:var(--ocean-800);margin-bottom:1.5rem;font-weight:700;
               font-size:1.6rem">📋 Mis Reservas</h2>

    <div id="reservasContainer">
        <div class="loading"><div class="spinner"></div></div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    requireAuth();
    const me = getCurrentUser();
    if (me) document.getElementById('navUsername').textContent = me.username;

    let reservaAcancelar = null;

    const CONFIG_ESTADO = {
        PENDIENTE:  { bg: '#fff8e1', border: '#ffb300', text: '#e65100', label: 'Pendiente',   icono: '⏳' },
        CONFIRMADA: { bg: '#e8f5e9', border: '#43a047', text: '#1b5e20', label: 'Confirmada',  icono: '✅' },
        CANCELADA:  { bg: '#fce4ec', border: '#e53935', text: '#b71c1c', label: 'Cancelada',   icono: '❌' },
        COMPLETADA: { bg: '#e3f2fd', border: '#1e88e5', text: '#0d47a1', label: 'Completada',  icono: '🏆' }
    };

    async function cargarReservas() {
        const container = document.getElementById('reservasContainer');
        try {
            const lista = await fetchAPI('/reservas/mis-reservas');

            if (!lista || lista.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align:center;padding:3rem">
                        <div style="font-size:3.5rem;margin-bottom:1rem">📋</div>
                        <p style="color:var(--gray-500);margin-bottom:1.5rem;font-size:1.05rem">
                            Todavía no tienes reservas.</p>
                        <a href="/pages/Inmersiones.html" class="btn btn-primary">
                            🤿 Ver Inmersiones Disponibles
                        </a>
                    </div>`;
                return;
            }

            container.innerHTML = lista.map(r => {
                const cfg = CONFIG_ESTADO[r.estado] || CONFIG_ESTADO.PENDIENTE;
                const fechaReserva = r.fechaReserva
                    ? new Date(r.fechaReserva).toLocaleDateString('es-ES', {
                        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
                      })
                    : 'Fecha no disponible';
                const fechaInmersion = r.inmersionFecha
                    ? new Date(r.inmersionFecha).toLocaleDateString('es-ES', {
                        day: 'numeric', month: 'long', year: 'numeric'
                      })
                    : null;
                const puedeCancel = r.estado === 'PENDIENTE' || r.estado === 'CONFIRMADA';

                return `
                <div class="card" style="margin-bottom:1.5rem;border-left:4px solid ${cfg.border}">
                    <div style="display:flex;justify-content:space-between;
                                align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
                        <div>
                            <h3 style="color:var(--ocean-800);font-weight:700;
                                       font-size:1.05rem;margin-bottom:.25rem">
                                🤿 ${escapeHtml(r.inmersionTitulo || 'Inmersión')}
                            </h3>
                            <p style="color:var(--gray-500);font-size:.85rem">
                                ${escapeHtml(r.centroBuceoNombre || 'Centro no especificado')}
                            </p>
                        </div>
                        <span style="background:${cfg.bg};color:${cfg.text};
                                     border:1px solid ${cfg.border};
                                     padding:.35rem .9rem;border-radius:20px;
                                     font-size:.82rem;font-weight:700;white-space:nowrap">
                            ${cfg.icono} ${cfg.label}
                        </span>
                    </div>

                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
                                gap:.5rem .75rem;font-size:.875rem;color:var(--gray-600);
                                margin-bottom:1rem">
                        <span>📅 Reserva: ${fechaReserva}</span>
                        ${fechaInmersion ? `<span>🗓️ Inmersión: ${fechaInmersion}</span>` : ''}
                        ${r.numeroPersonas != null ? `<span>👥 ${r.numeroPersonas} persona(s)</span>` : ''}
                        ${r.precioTotal != null
                            ? `<span>💶 <strong style="color:var(--ocean-700)">${r.precioTotal.toFixed(2)} €</strong></span>`
                            : ''}
                    </div>

                    ${r.observaciones ? `
                    <p style="font-size:.85rem;color:var(--gray-600);
                              background:var(--gray-100);padding:.5rem .75rem;
                              border-radius:6px;margin-bottom:1rem">
                        📝 ${escapeHtml(r.observaciones)}
                    </p>` : ''}

                    ${puedeCancel ? `
                    <div style="border-top:1px solid var(--gray-200);padding-top:1rem">
                        <button class="btn btn-danger btn-sm"
                            onclick="pedirCancelacion(${r.id})">
                            Cancelar reserva
                        </button>
                    </div>` : ''}
                </div>`;
            }).join('');

        } catch (err) {
            container.innerHTML = `
                <div class="card" style="text-align:center;color:#c62828;padding:2rem">
                    Error al cargar reservas: ${escapeHtml(err.message)}
                </div>`;
        }
    }

    function pedirCancelacion(id) {
        reservaAcancelar = id;
        document.getElementById('modalCancelar').style.display = 'flex';
    }

    function cerrarModal() {
        reservaAcancelar = null;
        document.getElementById('modalCancelar').style.display = 'none';
    }

    async function confirmarCancelacion() {
        if (!reservaAcancelar) return;
        const btn = document.getElementById('btnConfirmarCancelar');
        btn.disabled = true;
        btn.textContent = 'Cancelando...';
        try {
            await fetchAPI(`/reservas/${reservaAcancelar}`, { method: 'DELETE' });
            cerrarModal();
            showAlert('Reserva cancelada. Las plazas han quedado liberadas.', 'success');
            await cargarReservas();
        } catch (err) {
            showAlert(err.message || 'No se pudo cancelar la reserva.', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sí, cancelar';
        }
    }

    cargarReservas();
</script>
</body>
</html>
