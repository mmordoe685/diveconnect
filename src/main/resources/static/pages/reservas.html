<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Reservas — DiveConnect</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .reserva-card {
      background: linear-gradient(160deg, rgba(14,77,100,0.12) 0%, rgba(255,255,255,0.04) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 4px solid var(--turquoise);
      transition: all var(--transition);
    }
    .reserva-card:hover {
      box-shadow: 0 8px 32px rgba(14,77,100,0.2);
      transform: translateY(-2px);
      border-color: rgba(46,196,182,0.2);
      border-left-color: var(--turquoise);
    }
    .reserva-card.PENDIENTE  { border-left-color: #F59E0B; }
    .reserva-card.CONFIRMADA { border-left-color: #22C55E; }
    .reserva-card.CANCELADA  { border-left-color: #EF4444; opacity: .7; }
    .reserva-card.COMPLETADA { border-left-color: #3B82F6; }
    .reserva-header { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; margin-bottom:1rem; flex-wrap:wrap; }
    .reserva-titulo { font-size:1.02rem; font-weight:700; color:var(--text); margin-bottom:.15rem; }
    .reserva-centro { font-size:.82rem; color:var(--text-muted); }
    .estado-badge {
      display:inline-flex; align-items:center; gap:.3rem;
      padding:.28rem .8rem; border-radius:var(--radius-full);
      font-size:.76rem; font-weight:700; white-space:nowrap;
    }
    .estado-PENDIENTE  { background:#FEF3C7; color:#92400E; }
    .estado-CONFIRMADA { background:#DCFCE7; color:#166534; }
    .estado-CANCELADA  { background:#FEE2E2; color:#991B1B; }
    .estado-COMPLETADA { background:#DBEAFE; color:#1E40AF; }
    .reserva-meta { display:flex; flex-wrap:wrap; gap:.4rem 1.25rem; font-size:.83rem; color:var(--text-muted); margin-bottom:1rem; }
    .reserva-precio { font-family:'Poppins',sans-serif; font-size:1.4rem; font-weight:700; color:var(--turquoise); }
    .filtros-tabs { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .filtro-tab {
      padding:.4rem 1rem; border-radius:var(--radius-full);
      font-size:.82rem; font-weight:600; cursor:pointer;
      border:2px solid var(--glass-border); background:var(--glass); color:var(--text-muted);
      transition:all var(--transition-fast);
    }
    .filtro-tab.active { background:var(--turquoise); border-color:var(--turquoise); color:var(--deep); }
    .filtro-tab:hover:not(.active) { border-color:var(--turquoise); color:var(--turquoise); }
    .resumen-card {
      background:linear-gradient(135deg,var(--ocean-950),var(--ocean-800));
      color:var(--white); border-radius:var(--radius-lg);
      padding:1.35rem 1.75rem; display:flex; gap:2.5rem; flex-wrap:wrap;
      margin-bottom:2rem; box-shadow:var(--shadow-lg);
    }
    .resumen-stat { text-align:center; }
    .resumen-num { font-family:'Poppins',sans-serif; font-size:1.8rem; font-weight:800; color:var(--ocean-300); line-height:1; }
    .resumen-label { font-size:.76rem; color:rgba(255,255,255,.6); margin-top:.2rem; }
  </style>
</head>
<body>

<header class="navbar" id="mainNavbar"></header>

<!-- Modal cancelar -->
<div id="modalCancelar" style="display:none;position:fixed;inset:0;
     background:rgba(6,18,36,.75);backdrop-filter:blur(8px);z-index:2000;
     justify-content:center;align-items:center;padding:1rem">
  <div style="background:var(--deep);border:1px solid var(--glass-border);border-radius:var(--radius-xl);padding:2.25rem 2.5rem;
              max-width:420px;width:100%;box-shadow:var(--shadow-2xl);animation:modalIn .25s ease">
    <h3 style="font-family:'Poppins',sans-serif;font-size:1.2rem;font-weight:700;
               color:var(--text);margin-bottom:.5rem">Cancelar reserva</h3>
    <p style="color:var(--text-muted);margin-bottom:1.75rem;font-size:.88rem;line-height:1.65">
      Esta acción no se puede deshacer. Las plazas quedarán disponibles para otros usuarios.</p>
    <div style="display:flex;gap:.75rem">
      <button class="btn btn-secondary" style="flex:1" onclick="cerrarModal()">Mantener</button>
      <button class="btn btn-danger" style="flex:1" id="btnConfirmarCancelar" onclick="confirmarCancelacion()">Confirmar cancelación</button>
    </div>
  </div>
</div>

<div class="container">
  <div style="margin-bottom:1.75rem">
    <h2 style="font-family:'Montserrat',sans-serif;font-size:1.65rem;font-weight:700;
               color:var(--text);letter-spacing:-0.02em">Mis Reservas</h2>
    <p style="color:var(--text-muted);font-size:.88rem;margin-top:.15rem">
      Historial y gestión de tus reservas de inmersiones
    </p>
  </div>

  <div class="resumen-card" id="resumenCard" style="display:none">
    <div class="resumen-stat"><div class="resumen-num" id="statTotal">0</div><div class="resumen-label">Total</div></div>
    <div class="resumen-stat"><div class="resumen-num" id="statPendientes">0</div><div class="resumen-label">Pendientes</div></div>
    <div class="resumen-stat"><div class="resumen-num" id="statCompletadas">0</div><div class="resumen-label">Completadas</div></div>
    <div class="resumen-stat"><div class="resumen-num" id="statGasto">0&euro;</div><div class="resumen-label">Invertido</div></div>
  </div>

  <div class="filtros-tabs" id="filtrosTabs" style="display:none">
    <button class="filtro-tab active" onclick="filtrarEstado('TODAS',this)">Todas</button>
    <button class="filtro-tab" onclick="filtrarEstado('PENDIENTE',this)">Pendientes</button>
    <button class="filtro-tab" onclick="filtrarEstado('CONFIRMADA',this)">Confirmadas</button>
    <button class="filtro-tab" onclick="filtrarEstado('COMPLETADA',this)">Completadas</button>
    <button class="filtro-tab" onclick="filtrarEstado('CANCELADA',this)">Canceladas</button>
  </div>

  <div id="reservasContainer"><div class="loading"><div class="spinner"></div></div></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script>
  requireAuth(); initNav();

  let todasReservas = [];
  let reservaAcancelar = null;

  const ESTADOS = {
    PENDIENTE:  { label:'Pendiente'  },
    CONFIRMADA: { label:'Confirmada' },
    CANCELADA:  { label:'Cancelada'  },
    COMPLETADA: { label:'Completada' }
  };

  async function cargarReservas() {
    const container = document.getElementById('reservasContainer');
    try {
      const lista = await fetchAPI('/reservas/mis-reservas');
      todasReservas = lista || [];
      if (todasReservas.length === 0) {
        container.innerHTML = `<div class="card" style="text-align:center;padding:3.5rem">
          <p style="color:var(--gray-500);font-size:1rem;margin-bottom:1.5rem">No tienes reservas todavía.</p>
          <a href="/pages/Inmersiones.html" class="btn btn-primary">Ver inmersiones disponibles</a></div>`;
        return;
      }
      const pendientes  = todasReservas.filter(r => r.estado === 'PENDIENTE').length;
      const completadas = todasReservas.filter(r => r.estado === 'COMPLETADA').length;
      const gasto = todasReservas.filter(r => r.estado !== 'CANCELADA').reduce((s, r) => s + (r.precioTotal || 0), 0);
      document.getElementById('statTotal').textContent       = todasReservas.length;
      document.getElementById('statPendientes').textContent  = pendientes;
      document.getElementById('statCompletadas').textContent = completadas;
      document.getElementById('statGasto').textContent       = gasto.toFixed(0) + '\u20AC';
      document.getElementById('resumenCard').style.display   = 'flex';
      document.getElementById('filtrosTabs').style.display   = 'flex';
      renderReservas(todasReservas);
    } catch (err) {
      container.innerHTML = `<div class="card" style="text-align:center;color:#c62828;padding:2rem">
        Error: ${escapeHtml(err.message)}</div>`;
    }
  }

  function filtrarEstado(estado, btn) {
    document.querySelectorAll('.filtro-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderReservas(estado === 'TODAS' ? todasReservas : todasReservas.filter(r => r.estado === estado));
  }

  function renderReservas(lista) {
    const container = document.getElementById('reservasContainer');
    if (!lista || lista.length === 0) {
      container.innerHTML = `<div class="card" style="text-align:center;color:var(--gray-500);padding:2.5rem">
        No hay reservas en este estado.</div>`;
      return;
    }
    container.innerHTML = lista.map(r => {
      const cfg = ESTADOS[r.estado] || ESTADOS.PENDIENTE;
      const fechaRes = r.fechaReserva ? new Date(r.fechaReserva).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'}) : null;
      const fechaInm = r.inmersionFecha ? new Date(r.inmersionFecha).toLocaleDateString('es-ES',{day:'numeric',month:'long'}) : null;
      const puedeCancel = r.estado === 'PENDIENTE' || r.estado === 'CONFIRMADA';
      return `
        <div class="reserva-card ${r.estado}">
          <div class="reserva-header">
            <div>
              <div class="reserva-titulo">${escapeHtml(r.inmersionTitulo || 'Inmersión')}</div>
              <div class="reserva-centro">${escapeHtml(r.centroBuceoNombre || 'Centro de buceo')}</div>
            </div>
            <span class="estado-badge estado-${r.estado}">${cfg.label}</span>
          </div>
          <div class="reserva-meta">
            ${fechaRes ? `<span>Reservado el ${fechaRes}</span>` : ''}
            ${fechaInm ? `<span>Inmersión: ${fechaInm}</span>` : ''}
            ${r.numeroPersonas != null ? `<span>${r.numeroPersonas} persona${r.numeroPersonas !== 1 ? 's' : ''}</span>` : ''}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem">
            ${r.precioTotal != null ? `<div class="reserva-precio">${r.precioTotal.toFixed(2)} &euro;</div>` : '<div></div>'}
            ${puedeCancel ? `<button class="btn btn-danger btn-sm" onclick="pedirCancelacion(${r.id})">Cancelar</button>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function pedirCancelacion(id) { reservaAcancelar = id; document.getElementById('modalCancelar').style.display = 'flex'; }
  function cerrarModal() { reservaAcancelar = null; document.getElementById('modalCancelar').style.display = 'none'; }

  async function confirmarCancelacion() {
    if (!reservaAcancelar) return;
    const btn = document.getElementById('btnConfirmarCancelar');
    btn.disabled = true; btn.textContent = 'Cancelando...';
    try {
      await fetchAPI(`/reservas/${reservaAcancelar}`, { method: 'DELETE' });
      cerrarModal();
      showAlert('Reserva cancelada correctamente.', 'success');
      await cargarReservas();
    } catch (err) {
      showAlert(err.message || 'No se pudo cancelar.', 'error');
    } finally { btn.disabled = false; btn.textContent = 'Confirmar cancelación'; }
  }

  document.getElementById('modalCancelar').addEventListener('click', function(e) { if (e.target === this) cerrarModal(); });
  cargarReservas();
</script>
</body>
</html>
