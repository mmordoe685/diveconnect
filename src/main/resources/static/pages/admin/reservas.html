<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reservas — DiveConnect Admin</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<header class="navbar" id="mainNavbar"></header>

<div class="container-wide" style="padding-top:2rem">
  <div class="section-header">
    <h2>Gestión de Reservas</h2>
    <a href="/pages/admin/dashboard.html" class="btn btn-outline">← Dashboard</a>
  </div>

  <div class="page-tabs">
    <button class="tab active" onclick="filtrarEstado('TODOS', this)">Todas</button>
    <button class="tab" onclick="filtrarEstado('PENDIENTE', this)">Pendientes</button>
    <button class="tab" onclick="filtrarEstado('CONFIRMADA', this)">Confirmadas</button>
    <button class="tab" onclick="filtrarEstado('COMPLETADA', this)">Completadas</button>
    <button class="tab" onclick="filtrarEstado('CANCELADA', this)">Canceladas</button>
  </div>

  <div class="table-toolbar">
    <input type="search" id="filtro" placeholder="Buscar cliente o inmersión…" oninput="renderFiltrado()"/>
  </div>

  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr><th>#</th><th>Cliente</th><th>Inmersión</th><th>Centro</th><th>Fecha</th><th>Personas</th><th>Total</th><th>Estado</th><th>Acciones</th></tr>
      </thead>
      <tbody id="tablaCuerpo">
        <tr><td colspan="9" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
let todos = [];
let estadoActivo = 'TODOS';

document.addEventListener('DOMContentLoaded', async () => {
  if (!requireRole('ADMINISTRADOR')) return;
  initNav();
  try {
    const data = await fetchAPI('/admin/reservas');
    todos = data || [];
    renderFiltrado();
  } catch (err) {
    document.getElementById('tablaCuerpo').innerHTML =
      '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--coral)">' +
      'Error al cargar reservas: ' + escapeHtml(err.message) + '</td></tr>';
  }
});

function filtrarEstado(estado, btn) {
  estadoActivo = estado;
  document.querySelectorAll('.page-tabs .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderFiltrado();
}

function renderFiltrado() {
  const q = document.getElementById('filtro').value.toLowerCase();
  let lista = estadoActivo === 'TODOS' ? todos : todos.filter(r => r.estado === estadoActivo);
  if (q) lista = lista.filter(r =>
    (r.usuarioUsername || '').toLowerCase().includes(q) ||
    (r.inmersionTitulo || '').toLowerCase().includes(q)
  );
  renderTabla(lista);
}

function renderTabla(lista) {
  const tbody = document.getElementById('tablaCuerpo');
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="icon"></div><p>Sin reservas</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(r => `
    <tr>
      <td>#${r.id}</td>
      <td>${r.usuarioUsername || '—'}</td>
      <td>${r.inmersionTitulo || '—'}</td>
      <td>${r.centroBuceoNombre || '—'}</td>
      <td>${r.fechaReserva ? new Date(r.fechaReserva).toLocaleDateString('es-ES') : '—'}</td>
      <td>${r.numeroPersonas}</td>
      <td>${r.precioTotal != null ? r.precioTotal.toFixed(2) + ' €' : '—'}</td>
      <td><span class="badge ${estadoBadge(r.estado)}">${r.estado}</span></td>
      <td>
        ${r.estado !== 'CANCELADA' && r.estado !== 'COMPLETADA'
          ? `<button class="btn-icon danger" onclick="cancelar(${r.id})" title="Cancelar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`
          : '—'}
      </td>
    </tr>
  `).join('');
}

function estadoBadge(e) {
  return e === 'CONFIRMADA' ? 'badge-success'
       : e === 'PENDIENTE'  ? 'badge-warning'
       : e === 'COMPLETADA' ? 'badge-info'
       : 'badge-danger';
}

async function cancelar(id) {
  if (!confirm('¿Cancelar esta reserva?')) return;
  await fetchAPI('/admin/reservas/' + id, { method: 'DELETE' });
  const r = todos.find(x => x.id === id);
  if (r) r.estado = 'CANCELADA';
  renderFiltrado();
}
</script>
<script src="/js/animations.js"></script>
</body>
</html>
