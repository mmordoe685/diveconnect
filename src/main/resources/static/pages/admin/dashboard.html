<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Panel Admin — DiveConnect</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .admin-nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .admin-nav-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 1.75rem 1.5rem;
      text-align: center;
      text-decoration: none;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(226,232,240,.8);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .admin-nav-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      text-decoration: none;
    }
    .admin-nav-card .icon {
      width: 56px; height: 56px;
      margin: 0 auto .75rem;
      background: linear-gradient(135deg, var(--ocean-50), var(--ocean-100));
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
    }
    .admin-nav-card h3 {
      font-size: 1rem; font-weight: 700;
      color: var(--ocean-950); margin-bottom: .2rem;
    }
    .admin-nav-card p {
      margin: 0; color: var(--gray-500); font-size: .84rem;
    }
  </style>
</head>
<body>
<header class="navbar" id="mainNavbar"></header>

<div class="container" style="padding-top:2rem">
  <div class="section-header">
    <div>
      <h2 style="font-family:'Poppins',sans-serif;font-size:1.65rem;font-weight:700;
                 color:var(--ocean-950);letter-spacing:-0.02em">Panel de Administración</h2>
      <p style="color:var(--gray-500);font-size:.88rem;margin-top:.15rem">
        Supervisión y gestión completa de la plataforma
      </p>
    </div>
    <span class="badge badge-admin">Administrador</span>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-700)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <div class="stat-value" id="sUsuarios">&mdash;</div><div class="stat-label">Usuarios</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-700)" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
      <div class="stat-value" id="sEmpresas">&mdash;</div><div class="stat-label">Empresas</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-700)" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div class="stat-value" id="sCentros">&mdash;</div><div class="stat-label">Centros</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-700)" stroke-width="2"><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg></div>
      <div class="stat-value" id="sInmersiones">&mdash;</div><div class="stat-label">Inmersiones</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-700)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
      <div class="stat-value" id="sReservas">&mdash;</div><div class="stat-label">Reservas</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
      <div class="stat-value" id="sPendientes">&mdash;</div><div class="stat-label">Pendientes</div>
    </div>
  </div>

  <div class="admin-nav-grid">
    <a href="/pages/admin/usuarios.html" class="admin-nav-card">
      <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-700)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <h3>Usuarios</h3>
      <p>Gestionar roles y estado</p>
    </a>
    <a href="/pages/admin/centros.html" class="admin-nav-card">
      <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-700)" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <h3>Centros</h3>
      <p>Ver y gestionar centros</p>
    </a>
    <a href="/pages/admin/inmersiones.html" class="admin-nav-card">
      <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-700)" stroke-width="2"><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg></div>
      <h3>Inmersiones</h3>
      <p>Ver y moderar oferta</p>
    </a>
    <a href="/pages/admin/reservas.html" class="admin-nav-card">
      <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-700)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
      <h3>Reservas</h3>
      <p>Control de reservas</p>
    </a>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!requireRole('ADMINISTRADOR')) return;
  initNav();
  const stats = await fetchAPI('/admin/stats');
  if (!stats) return;
  document.getElementById('sUsuarios').textContent    = stats.totalUsuarios    ?? '—';
  document.getElementById('sEmpresas').textContent    = stats.totalEmpresas    ?? '—';
  document.getElementById('sCentros').textContent     = stats.totalCentros     ?? '—';
  document.getElementById('sInmersiones').textContent = stats.totalInmersiones ?? '—';
  document.getElementById('sReservas').textContent    = stats.totalReservas    ?? '—';
  document.getElementById('sPendientes').textContent  = stats.reservasPendientes ?? '—';
});
</script>
</body>
</html>
