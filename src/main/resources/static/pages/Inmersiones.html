<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inmersiones — DiveConnect</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .inmersiones-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .inm-card {
      background: linear-gradient(160deg, rgba(14,77,100,0.12) 0%, rgba(255,255,255,0.04) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
    }
    .inm-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(14,77,100,0.25), 0 0 20px rgba(46,196,182,0.06);
      border-color: rgba(46,196,182,0.2);
    }
    .inm-img {
      width: 100%; height: 190px;
      object-fit: cover;
      background: linear-gradient(135deg,var(--ocean-800),var(--ocean-950));
    }
    .inm-img-ph {
      width: 100%; height: 190px;
      background: linear-gradient(135deg,var(--ocean-800),var(--ocean-950));
      display: flex; align-items: center; justify-content: center;
    }
    .inm-img-ph svg { opacity: .3; }
    .inm-body {
      padding: 1.25rem 1.35rem;
      flex: 1; display: flex; flex-direction: column;
    }
    .inm-nivel {
      display: inline-block;
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      border-radius: var(--radius-full);
      padding: .18rem .65rem;
      margin-bottom: .55rem; width: fit-content;
    }
    .inm-titulo {
      font-size: 1.02rem; font-weight: 700;
      color: var(--text); margin-bottom: .4rem; line-height: 1.35;
    }
    .inm-desc {
      font-size: .84rem; color: var(--text-muted); line-height: 1.6;
      margin-bottom: .85rem;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .inm-meta {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: .3rem; font-size: .78rem; color: var(--text-dim); margin-bottom: .9rem;
    }
    .inm-meta span { display: flex; align-items: center; gap: .3rem; }
    .inm-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: auto; padding-top: .85rem; border-top: 1px solid var(--glass-border);
    }
    .inm-precio {
      font-family: 'Poppins', sans-serif;
      font-size: 1.35rem; font-weight: 700; color: var(--turquoise);
    }
    .inm-precio small {
      font-size: .76rem; font-weight: 500; color: var(--text-muted); font-family: 'Inter', sans-serif;
    }

    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(6,18,36,.75); backdrop-filter:blur(8px);
      z-index:2000; align-items:center; justify-content:center; padding:1rem;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--deep); border:1px solid var(--glass-border);
      border-radius:var(--radius-xl);
      padding:2.25rem 2.5rem; width:100%; max-width:440px;
      box-shadow:var(--shadow-2xl); animation:modalIn .25s ease both;
    }
    .modal h3 { font-family:'Poppins',sans-serif; font-size:1.3rem; font-weight:700;
                color:var(--text); margin-bottom:.3rem; }
    .modal .subtitle { color:var(--text-muted); font-size:.88rem; margin-bottom:1.5rem; }
    .modal-total {
      background:rgba(46,196,182,0.08); border:1px solid rgba(46,196,182,0.15);
      border-radius:var(--radius-md); padding:1rem 1.25rem; margin:1rem 0;
      display:flex; justify-content:space-between; align-items:center;
    }
    .modal-total span { font-size:.9rem; color:var(--text-muted); }
    .modal-total strong { font-size:1.3rem; color:var(--turquoise);
                          font-family:'Poppins',sans-serif; font-weight:700; }
    .modal-actions { display:flex; gap:.75rem; margin-top:1.25rem; }

    .filtros-bar {
      display:flex; gap:1rem; flex-wrap:wrap; align-items:center;
      margin-bottom:1.5rem;
    }
    .filtros-bar input, .filtros-bar select { flex:1; min-width:160px; }
  </style>
</head>
<body>

<header class="navbar" id="mainNavbar"></header>

<div class="container-wide">
  <div class="section-header" style="margin-bottom:1.5rem">
    <div>
      <h2 style="font-family:'Montserrat',sans-serif;font-size:1.65rem;font-weight:700;
                 color:var(--text);letter-spacing:-0.02em">
        Inmersiones disponibles
      </h2>
      <p style="color:var(--text-muted);font-size:.88rem;margin-top:.15rem">
        Encuentra y reserva tu próxima aventura submarina
      </p>
    </div>
  </div>

  <div class="filtros-bar">
    <input type="text" id="buscarInput" class="form-input"
           placeholder="Buscar por nombre o lugar..." oninput="filtrar()">
    <select id="nivelFilter" class="form-input" onchange="filtrar()">
      <option value="">Todos los niveles</option>
      <option value="Sin certificación">Sin certificación</option>
      <option value="Sin experiencia">Sin experiencia</option>
      <option value="Open Water">Open Water</option>
      <option value="Advanced Open Water">Advanced Open Water</option>
      <option value="Rescue Diver">Rescue Diver</option>
      <option value="Divemaster">Divemaster</option>
    </select>
    <select id="ordenFilter" class="form-input" onchange="filtrar()">
      <option value="precio-asc">Precio: menor a mayor</option>
      <option value="precio-desc">Precio: mayor a menor</option>
      <option value="profundidad">Mayor profundidad</option>
    </select>
  </div>

  <div id="inmersionesContainer">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<!-- Modal de reserva -->
<div class="modal-overlay" id="reservaModal">
  <div class="modal">
    <h3 id="modalTitulo">Reservar inmersión</h3>
    <p class="subtitle" id="modalSubtitulo"></p>
    <div id="alertModal"></div>
    <div class="form-group">
      <label class="form-label">Número de personas</label>
      <input type="number" id="numPersonas" class="form-input" value="1" min="1" oninput="actualizarTotal()">
    </div>
    <div class="modal-total">
      <span>Total estimado</span>
      <strong id="totalPrecio">&mdash;</strong>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" style="flex:1" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:2" id="confirmarBtn" onclick="confirmarReserva()">Confirmar reserva</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script>
  requireAuth(); initNav();

  let todasInmersiones = [];
  let inmersionActual = null;

  async function cargarInmersiones() {
    const container = document.getElementById('inmersionesContainer');
    try {
      const lista = await fetchAPI('/inmersiones/disponibles');
      todasInmersiones = lista || [];
      if (todasInmersiones.length === 0) {
        container.innerHTML = `
          <div style="text-align:center;padding:4rem;color:var(--gray-500)">
            <p style="font-size:1rem">No hay inmersiones disponibles en este momento.</p>
          </div>`;
        return;
      }
      renderInmersiones(todasInmersiones);
    } catch (err) {
      container.innerHTML = `<div class="card" style="text-align:center;padding:2rem;color:#c62828">
        Error al cargar: ${escapeHtml(err.message)}</div>`;
    }
  }

  function filtrar() {
    const q     = document.getElementById('buscarInput').value.toLowerCase();
    const nivel = document.getElementById('nivelFilter').value;
    const orden = document.getElementById('ordenFilter').value;

    let lista = todasInmersiones.filter(i => {
      const matchQ = !q ||
        (i.titulo || '').toLowerCase().includes(q) ||
        (i.ubicacion || '').toLowerCase().includes(q) ||
        (i.centroBuceoNombre || '').toLowerCase().includes(q);
      const matchNivel = !nivel || (i.nivelRequerido || '') === nivel;
      return matchQ && matchNivel;
    });

    lista = [...lista].sort((a, b) => {
      if (orden === 'precio-asc')  return (a.precio || 0) - (b.precio || 0);
      if (orden === 'precio-desc') return (b.precio || 0) - (a.precio || 0);
      if (orden === 'profundidad') return (b.profundidadMaxima || 0) - (a.profundidadMaxima || 0);
      return 0;
    });

    renderInmersiones(lista);
  }

  function renderInmersiones(lista) {
    const container = document.getElementById('inmersionesContainer');
    if (!lista || lista.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--gray-500)">
        <p>No se encontraron inmersiones con ese filtro.</p></div>`;
      return;
    }

    const nivelColor = {
      'Sin certificación':  '#DCFCE7:#166534',
      'Sin experiencia':    '#DCFCE7:#166534',
      'Open Water':         '#DCFCE7:#166534',
      'Advanced Open Water':'#DBEAFE:#1E40AF',
      'Rescue Diver':       '#FEF3C7:#92400E',
      'Divemaster':         '#EDE9FE:#5B21B6',
    };

    container.innerHTML = `<div class="inmersiones-grid">${lista.map(i => {
      const nc = (nivelColor[i.nivelRequerido] || 'var(--ocean-100):var(--ocean-800)').split(':');
      const fecha = i.fechaInmersion
        ? new Date(i.fechaInmersion).toLocaleDateString('es-ES', { day:'numeric', month:'short' })
        : null;
      const img = i.imagenUrl
        ? `<img src="${escapeHtml(i.imagenUrl)}" class="inm-img" alt="${escapeHtml(i.titulo)}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      return `
        <div class="inm-card">
          ${img}
          <div class="inm-img-ph" ${i.imagenUrl ? 'style="display:none"' : ''}>
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
              <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
              <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
          </div>
          <div class="inm-body">
            <span class="inm-nivel" style="background:${nc[0]};color:${nc[1]}">
              ${escapeHtml(i.nivelRequerido || 'Todos los niveles')}
            </span>
            <div class="inm-titulo">${escapeHtml(i.titulo)}</div>
            ${i.descripcion ? `<p class="inm-desc">${escapeHtml(i.descripcion)}</p>` : ''}
            <div class="inm-meta">
              ${i.ubicacion ? `<span>${escapeHtml(i.ubicacion)}</span>` : ''}
              <span>${i.duracion || '—'} min</span>
              <span>Máx. ${i.profundidadMaxima || '—'}m</span>
              <span>${i.plazasDisponibles} plazas</span>
              ${fecha ? `<span>${fecha}</span>` : ''}
              ${i.centroBuceoNombre ? `<span>${escapeHtml(i.centroBuceoNombre)}</span>` : ''}
            </div>
            <div class="inm-footer">
              <div class="inm-precio">
                ${i.precio}&euro; <small>/ persona</small>
              </div>
              <button class="btn btn-primary btn-sm"
                onclick='abrirModal(${JSON.stringify(i)})'>
                Reservar
              </button>
            </div>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  function abrirModal(inmersion) {
    inmersionActual = inmersion;
    document.getElementById('modalTitulo').textContent = inmersion.titulo;
    document.getElementById('modalSubtitulo').textContent =
      `${inmersion.precio}\u20AC/persona \u00B7 ${inmersion.plazasDisponibles} plazas disponibles`;
    document.getElementById('numPersonas').max = inmersion.plazasDisponibles;
    document.getElementById('numPersonas').value = 1;
    document.getElementById('alertModal').innerHTML = '';
    actualizarTotal();
    document.getElementById('reservaModal').classList.add('open');
  }

  function cerrarModal() {
    document.getElementById('reservaModal').classList.remove('open');
    inmersionActual = null;
  }

  function actualizarTotal() {
    if (!inmersionActual) return;
    const num   = parseInt(document.getElementById('numPersonas').value) || 1;
    const total = (inmersionActual.precio * num).toFixed(2);
    document.getElementById('totalPrecio').textContent = `${total}\u20AC`;
  }

  async function confirmarReserva() {
    if (!inmersionActual) return;
    const num = parseInt(document.getElementById('numPersonas').value);
    if (!num || num < 1) {
      document.getElementById('alertModal').innerHTML =
        '<div class="alert alert-error">Introduce un número de personas válido.</div>';
      return;
    }
    if (num > inmersionActual.plazasDisponibles) {
      document.getElementById('alertModal').innerHTML =
        `<div class="alert alert-error">Solo quedan ${inmersionActual.plazasDisponibles} plazas.</div>`;
      return;
    }

    const btn = document.getElementById('confirmarBtn');
    btn.disabled = true; btn.textContent = 'Procesando...';

    try {
      await fetchAPI('/reservas', {
        method: 'POST',
        body: JSON.stringify({ inmersionId: inmersionActual.id, numeroPersonas: num })
      });
      cerrarModal();
      showAlert(`Reserva confirmada. Total: ${(inmersionActual.precio * num).toFixed(2)}\u20AC. Consulta el estado en Mis Reservas.`, 'success');
      setTimeout(() => cargarInmersiones(), 1500);
    } catch (err) {
      document.getElementById('alertModal').innerHTML =
        `<div class="alert alert-error">${escapeHtml(err.message || 'Error al reservar')}</div>`;
    } finally {
      btn.disabled = false; btn.textContent = 'Confirmar reserva';
    }
  }

  document.getElementById('reservaModal').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });

  cargarInmersiones();
</script>
</body>
</html>
