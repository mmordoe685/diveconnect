<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmersiones - DiveConnect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">
        <a href="/pages/feed.html" class="navbar-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
            <span>DiveConnect</span>
        </a>
        <ul class="navbar-menu">
            <li><a href="/pages/feed.html">Feed</a></li>
            <li><a href="/pages/inmersiones.html">Inmersiones</a></li>
            <li><a href="/pages/perfil.html">Mi Perfil</a></li>
            <li class="navbar-user">
                <span id="navUsername"></span>
                <button class="btn btn-sm btn-secondary" onclick="logout()">Salir</button>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <h2 style="color:var(--ocean-800);margin-bottom:1.5rem;font-weight:700">🤿 Inmersiones Disponibles</h2>
    <div id="inmersionesContainer">
        <div class="loading"><div class="spinner"></div></div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    requireAuth();
    const me = getCurrentUser();
    if (me) document.getElementById('navUsername').textContent = me.username;

    async function cargarInmersiones() {
        const container = document.getElementById('inmersionesContainer');
        try {
            const lista = await fetchAPI('/inmersiones/disponibles');
            if (!lista || lista.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--gray-500);padding:3rem">No hay inmersiones disponibles en este momento.</p>';
                return;
            }
            container.innerHTML = lista.map(i => {
                const fecha = i.fechaInmersion
                    ? new Date(i.fechaInmersion).toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' })
                    : null;
                return `
                <div class="card" style="margin-bottom:1.5rem">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
                        <h3 style="color:var(--ocean-800);font-weight:600">${escapeHtml(i.titulo)}</h3>
                        <span style="background:var(--ocean-100);color:var(--ocean-800);padding:.3rem .8rem;border-radius:20px;font-weight:600;white-space:nowrap;margin-left:1rem">
                            ${i.precio}€/persona
                        </span>
                    </div>
                    ${i.descripcion ? `<p style="color:var(--gray-600);font-size:.9rem;margin-bottom:.75rem">${escapeHtml(i.descripcion)}</p>` : ''}
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem;font-size:.85rem;color:var(--gray-600);margin-bottom:1rem">
                        ${i.ubicacion || i.centroBuceoCiudad ? `<span>📍 ${escapeHtml(i.ubicacion || i.centroBuceoCiudad)}</span>` : ''}
                        <span>⏱️ ${i.duracion} min</span>
                        <span>🤿 ${escapeHtml(i.nivelRequerido || 'Todos los niveles')}</span>
                        <span>👥 ${i.plazasDisponibles} plazas</span>
                        ${i.profundidadMaxima ? `<span>📊 Máx. ${i.profundidadMaxima}m</span>` : ''}
                        ${fecha ? `<span>📅 ${fecha}</span>` : ''}
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <span style="font-size:.85rem;color:var(--gray-500)">${escapeHtml(i.centroBuceoNombre || '')}</span>
                        <button class="btn btn-primary btn-sm"
                            onclick="hacerReserva(${i.id}, ${i.precio}, ${i.plazasDisponibles})">
                            Reservar plaza
                        </button>
                    </div>
                </div>`;
            }).join('');
        } catch (err) {
            container.innerHTML = `<p style="text-align:center;color:var(--gray-500);padding:2rem">Error: ${err.message}</p>`;
        }
    }

    async function hacerReserva(inmersionId, precio, plazas) {
        const personas = prompt(`¿Cuántas personas? (${plazas} plazas disponibles · ${precio}€/persona)`);
        if (!personas) return;
        const num = parseInt(personas);
        if (isNaN(num) || num < 1) { showAlert('Número de personas no válido', 'error'); return; }
        if (num > plazas)          { showAlert('No hay suficientes plazas', 'error'); return; }

        const obs = prompt('Observaciones (opcional, pulsa Cancelar para omitir):') || '';

        try {
            await fetchAPI('/reservas', {
                method: 'POST',
                body: JSON.stringify({ inmersionId, numeroPersonas: num, observaciones: obs })
            });
            showAlert(`✅ Reserva realizada. Total: ${(precio * num).toFixed(2)}€`, 'success');
            cargarInmersiones();
        } catch (err) {
            showAlert(err.message || 'Error al reservar', 'error');
        }
    }

    cargarInmersiones();
</script>
</body>
</html>
