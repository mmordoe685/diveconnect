<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Listado de centros de buceo registrados en DiveConnect, con valoraciones y datos de contacto.">
  <meta name="theme-color" content="#00D4AA">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Centros de buceo — DiveConnect">
  <meta property="og:description" content="Listado de centros de buceo registrados en DiveConnect, con valoraciones y datos de contacto.">
  <meta property="og:image" content="/images/og-cover.png">
  <meta name="twitter:card" content="summary_large_image">
  <title>Centros de Buceo — DiveConnect</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Page hero ────────────────────────────────────────── */
    .centros-hero {
      background:
        radial-gradient(ellipse 70% 60% at 50% -10%, rgba(46,196,182,.11) 0%, transparent 65%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 1.5rem 2rem;
    }
    .centros-hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 1.25rem;
    }
    .centros-hero-text { flex: 1; min-width: 200px; }
    .centros-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--turquoise);
      margin-bottom: .55rem;
      opacity: .9;
    }
    .centros-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.5rem, 3vw, 2.1rem);
      font-weight: 800;
      color: var(--text-0);
      letter-spacing: -.03em;
      line-height: 1.15;
    }
    .centros-subtitle {
      font-size: .875rem;
      color: var(--text-2);
      margin-top: .35rem;
    }

    /* ── Search bar ───────────────────────────────────────── */
    .search-wrap {
      position: relative;
      flex-shrink: 0;
      width: 320px;
      max-width: 100%;
    }
    .search-wrap svg {
      position: absolute;
      left: .85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-2);
      pointer-events: none;
      flex-shrink: 0;
    }
    .search-input {
      width: 100%;
      padding: .65rem 1rem .65rem 2.6rem;
      border: 1px solid var(--border-h);
      border-radius: var(--r-full);
      background: var(--bg-2);
      color: var(--text-0);
      font-family: 'DM Serif Display', serif;
      font-size: .875rem;
      outline: none;
      transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .search-input::placeholder { color: var(--text-2); }
    .search-input:focus {
      border-color: var(--turquoise);
      box-shadow: 0 0 0 3px rgba(46,196,182,.12);
    }

    /* ── Results meta ─────────────────────────────────────── */
    .centros-meta {
      max-width: 1200px;
      margin: 1.5rem auto .85rem;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .8rem;
      color: var(--text-2);
    }
    .centros-count {
      font-weight: 700;
      color: var(--text-1);
    }

    /* ── Grid ─────────────────────────────────────────────── */
    .centros-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }

    /* ── Business listing card ────────────────────────────── */
    .centro-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--sh-md);
      transition: border-color var(--dur-md) var(--ease),
                  box-shadow var(--dur-md) var(--ease),
                  transform var(--dur-md) var(--ease);
    }
    .centro-card:hover {
      border-color: var(--border-acc);
      box-shadow: var(--sh-lg), var(--sh-glow);
      transform: translateY(-4px);
    }

    /* Image / placeholder */
    .centro-media {
      position: relative;
      width: 100%;
      height: 180px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .centro-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform var(--dur-lg) var(--ease);
    }
    .centro-card:hover .centro-media img {
      transform: scale(1.04);
    }
    .centro-media-ph {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0d2a42 0%, #0a1e30 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .centro-media-ph svg { opacity: .18; }

    /* Category badge inside image */
    .centro-badge {
      position: absolute;
      top: .75rem;
      left: .75rem;
      background: rgba(8,17,30,.7);
      backdrop-filter: blur(8px);
      color: var(--turquoise);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .25rem .65rem;
      border-radius: var(--r-full);
      border: 1px solid rgba(46,196,182,.25);
    }

    /* Body */
    .centro-body {
      padding: 1.15rem 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    /* Top row: name + rating */
    .centro-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: .6rem;
    }
    .centro-nombre {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-0);
      line-height: 1.3;
    }
    .centro-rating {
      display: inline-flex;
      align-items: center;
      gap: .2rem;
      font-size: .8rem;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
      background: rgba(255,209,102,.08);
      padding: .2rem .55rem;
      border-radius: var(--r-full);
      border: 1px solid rgba(255,209,102,.18);
    }
    .centro-rating svg { opacity: .9; }

    /* Location pill */
    .centro-location {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      color: var(--text-2);
      font-size: .78rem;
      font-weight: 500;
    }
    .centro-location svg { color: var(--turquoise); flex-shrink: 0; }

    /* Description */
    .centro-desc {
      font-size: .83rem;
      color: var(--text-2);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Contact details strip */
    .centro-contact {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      padding-top: .65rem;
      border-top: 1px solid var(--border);
    }
    .centro-contact-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      color: var(--text-2);
      min-width: 0;
    }
    .centro-contact-row svg { flex-shrink: 0; color: var(--text-2); }
    .centro-contact-row a {
      color: var(--text-1);
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color var(--dur) var(--ease);
    }
    .centro-contact-row a:hover { color: var(--turquoise); }

    /* Certifications tag */
    .centro-certs {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      background: rgba(167,139,250,.08);
      border: 1px solid rgba(167,139,250,.18);
      color: var(--purple);
      font-size: .72rem;
      font-weight: 600;
      padding: .25rem .7rem;
      border-radius: var(--r-full);
      width: fit-content;
    }

    /* CTA footer */
    .centro-footer {
      margin-top: auto;
      display: flex;
      gap: .6rem;
      padding-top: .75rem;
      border-top: 1px solid var(--border);
    }
    .centro-footer .btn { flex: 1; }

    /* ── Empty / error states ─────────────────────────────── */
    .centros-empty {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }
    .centros-empty-inner {
      text-align: center;
      padding: 5rem 2rem;
      border: 1px dashed var(--border-h);
      border-radius: var(--r-2xl);
      color: var(--text-2);
    }
    .centros-empty-inner svg { opacity: .25; margin: 0 auto .85rem; }
    .centros-empty-inner p { font-size: .9rem; }

    /* ── Loading skeleton ─────────────────────────────────── */
    .centros-loading {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }
    .skeleton-card {
      border-radius: var(--r-xl);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .skeleton-img {
      width: 100%;
      height: 180px;
      background: linear-gradient(90deg, var(--bg-2) 25%, var(--glass-h) 50%, var(--bg-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-body { padding: 1.15rem 1.25rem; display: flex; flex-direction: column; gap: .65rem; }
    .skeleton-line {
      height: .75rem;
      border-radius: var(--r-full);
      background: linear-gradient(90deg, var(--bg-2) 25%, var(--glass-h) 50%, var(--bg-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 600px) {
      .centros-hero-inner { gap: 1rem; }
      .search-wrap { width: 100%; }
      .centros-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="navbar" id="mainNavbar"></header>

<!-- Hero / search bar -->
<section class="centros-hero" data-reveal="fade-down">
  <div class="centros-hero-inner">
    <div class="centros-hero-text">
      <div class="centros-eyebrow">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        Directorio verificado
      </div>
      <h1 class="centros-title">Centros de Buceo</h1>
      <p class="centros-subtitle">Centros certificados en toda la costa española</p>
    </div>
    <div class="search-wrap" data-reveal="fade-left">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        id="buscarInput"
        class="search-input"
        placeholder="Buscar por nombre, ciudad..."
        oninput="filtrarCentros(this.value)"
        autocomplete="off"
      >
    </div>
  </div>
</section>

<!-- Results count -->
<div class="centros-meta" id="centrosMeta" data-reveal="fade-up" style="display:none">
  <span id="centrosCount" class="centros-count">0</span>
  <span>centros encontrados</span>
</div>

<!-- Dynamic content injected here -->
<div id="centrosContainer">
  <!-- Loading skeletons -->
  <div class="centros-loading">
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton-line" style="width:60%"></div>
        <div class="skeleton-line" style="width:40%"></div>
        <div class="skeleton-line" style="width:85%"></div>
        <div class="skeleton-line" style="width:70%"></div>
      </div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton-line" style="width:55%"></div>
        <div class="skeleton-line" style="width:35%"></div>
        <div class="skeleton-line" style="width:80%"></div>
        <div class="skeleton-line" style="width:65%"></div>
      </div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton-line" style="width:65%"></div>
        <div class="skeleton-line" style="width:45%"></div>
        <div class="skeleton-line" style="width:90%"></div>
        <div class="skeleton-line" style="width:60%"></div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script>
  requireAuth(); initNav();

  let todosCentros = [];

  /* ── SVG helpers ─────────────────────────────────────── */
  const ICON = {
    pin:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    phone:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.64 1.28l3-.01a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.07 6.07l.98-.99a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.92 16.92z"/></svg>`,
    mail: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>`,
    web:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    addr: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`,
    cert: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
    star: `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`,
    home: `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  };

  /* ── API load ────────────────────────────────────────── */
  async function cargarCentros() {
    const container = document.getElementById('centrosContainer');
    try {
      const lista = await fetchAPI('/centros-buceo');
      todosCentros = lista || [];
      if (todosCentros.length === 0) {
        container.innerHTML = emptyState('No hay centros de buceo registrados aún.');
        return;
      }
      renderCentros(todosCentros);
    } catch (err) {
      container.innerHTML = `
        <div class="centros-empty">
          <div class="centros-empty-inner">
            <p style="color:var(--coral)">Error al cargar centros: ${escapeHtml(err.message)}</p>
          </div>
        </div>`;
    }
  }

  /* ── Filter ──────────────────────────────────────────── */
  function filtrarCentros(query) {
    if (!query.trim()) { renderCentros(todosCentros); return; }
    const q = query.toLowerCase();
    renderCentros(todosCentros.filter(c =>
      (c.nombre      || '').toLowerCase().includes(q) ||
      (c.ciudad      || '').toLowerCase().includes(q) ||
      (c.descripcion || '').toLowerCase().includes(q)
    ));
  }

  /* ── Render ──────────────────────────────────────────── */
  function renderCentros(lista) {
    const container   = document.getElementById('centrosContainer');
    const metaBar     = document.getElementById('centrosMeta');
    const countSpan   = document.getElementById('centrosCount');

    if (!lista || lista.length === 0) {
      metaBar.style.display = 'none';
      container.innerHTML = emptyState('No se encontraron centros con ese criterio.');
      return;
    }

    metaBar.style.display = 'flex';
    countSpan.textContent  = lista.length;

    container.innerHTML = `<div class="centros-grid">${lista.map((c, i) => cardHtml(c, i)).join('')}</div>`;
  }

  /* ── Card builder ────────────────────────────────────── */
  function cardHtml(c, i) {
    const rating = c.valoracionMedia ? parseFloat(c.valoracionMedia).toFixed(1) : null;

    /* Media block */
    const mediaBlock = c.imagenUrl
      ? `<div class="centro-media">
           <img src="${escapeHtml(c.imagenUrl)}" alt="${escapeHtml(c.nombre)}"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="centro-media-ph" style="display:none">${ICON.home}</div>
           <span class="centro-badge">Centro de Buceo</span>
         </div>`
      : `<div class="centro-media">
           <div class="centro-media-ph">${ICON.home}</div>
           <span class="centro-badge">Centro de Buceo</span>
         </div>`;

    /* Rating pill */
    const ratingHtml = rating
      ? `<span class="centro-rating">${ICON.star} ${rating}</span>`
      : '';

    /* Location */
    const locationHtml = c.ciudad
      ? `<div class="centro-location">
           ${ICON.pin}
           ${escapeHtml(c.ciudad)}${c.pais ? ', ' + escapeHtml(c.pais) : ''}
         </div>`
      : '';

    /* Contact rows */
    const contactRows = [
      c.telefono ? `<div class="centro-contact-row">${ICON.phone}<a href="tel:${escapeHtml(c.telefono)}">${escapeHtml(c.telefono)}</a></div>` : '',
      c.email    ? `<div class="centro-contact-row">${ICON.mail}<a href="mailto:${escapeHtml(c.email)}">${escapeHtml(c.email)}</a></div>`    : '',
      c.sitioWeb ? `<div class="centro-contact-row">${ICON.web}<a href="${escapeHtml(c.sitioWeb)}" target="_blank" rel="noopener">${escapeHtml(c.sitioWeb).replace(/^https?:\/\//, '')}</a></div>` : '',
      c.direccion? `<div class="centro-contact-row">${ICON.addr}<span>${escapeHtml(c.direccion)}</span></div>` : '',
    ].filter(Boolean).join('');

    const contactBlock = contactRows
      ? `<div class="centro-contact">${contactRows}</div>`
      : '';

    /* Certifications */
    const certsHtml = c.certificaciones
      ? `<div class="centro-certs">${ICON.cert} ${escapeHtml(c.certificaciones)}</div>`
      : '';

    /* CTA footer */
    const webBtn = c.sitioWeb
      ? `<a href="${escapeHtml(c.sitioWeb)}" target="_blank" rel="noopener" class="btn btn-outline btn-sm">Web</a>`
      : '';

    return `
      <article class="centro-card" data-reveal="fade-up" data-delay="${i * 60}">
        ${mediaBlock}
        <div class="centro-body">
          <div class="centro-top">
            <h3 class="centro-nombre">${escapeHtml(c.nombre)}</h3>
            ${ratingHtml}
          </div>
          ${locationHtml}
          ${c.descripcion ? `<p class="centro-desc">${escapeHtml(c.descripcion)}</p>` : ''}
          ${certsHtml}
          ${contactBlock}
          <div class="centro-footer">
            <button class="btn btn-primary btn-sm"
              onclick="window.location.href='/pages/Inmersiones.html?centro=${c.id}'">
              Ver inmersiones
            </button>
            ${webBtn}
          </div>
        </div>
      </article>`;
  }

  /* ── Empty state ─────────────────────────────────────── */
  function emptyState(msg) {
    return `
      <div class="centros-empty">
        <div class="centros-empty-inner" data-reveal="fade-up">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <p>${escapeHtml(msg)}</p>
        </div>
      </div>`;
  }

  cargarCentros();
</script>
<script src="/js/animations.js"></script>
</body>
</html>
