<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centros de Buceo - DiveConnect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">
        <a href="/pages/feed.html" class="navbar-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
            <span>DiveConnect</span>
        </a>
        <ul class="navbar-menu">
            <li><a href="/pages/feed.html">Feed</a></li>
            <li><a href="/pages/Inmersiones.html">Inmersiones</a></li>
            <li><a href="/pages/centros.html" class="active">Centros</a></li>
            <li><a href="/pages/reservas.html">Mis Reservas</a></li>
            <li><a href="/pages/Perfil.html">Mi Perfil</a></li>
            <li class="navbar-user">
                <span id="navUsername"></span>
                <button class="btn btn-sm btn-secondary" onclick="logout()">Salir</button>
            </li>
        </ul>
    </div>
</nav>

<div class="container">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
        <h2 style="color:var(--ocean-800);font-weight:700;font-size:1.6rem">🏫 Centros de Buceo</h2>
        <input type="text" id="buscarInput" class="form-input"
               placeholder="🔍 Buscar por nombre o ciudad..."
               style="width:260px;max-width:100%"
               oninput="filtrarCentros(this.value)">
    </div>

    <div id="centrosContainer">
        <div class="loading"><div class="spinner"></div></div>
    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    requireAuth();
    const me = getCurrentUser();
    if (me) document.getElementById('navUsername').textContent = me.username;

    let todosCentros = [];

    async function cargarCentros() {
        const container = document.getElementById('centrosContainer');
        try {
            const lista = await fetchAPI('/centros-buceo');
            todosCentros = lista || [];
            if (todosCentros.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align:center;padding:3rem;color:var(--gray-500)">
                        <div style="font-size:3rem;margin-bottom:1rem">🏫</div>
                        <p>No hay centros de buceo registrados todavía.</p>
                    </div>`;
                return;
            }
            renderCentros(todosCentros);
        } catch (err) {
            container.innerHTML = `
                <div class="card" style="text-align:center;padding:2rem;color:#c62828">
                    Error al cargar centros: ${escapeHtml(err.message)}
                </div>`;
        }
    }

    function filtrarCentros(query) {
        if (!query.trim()) { renderCentros(todosCentros); return; }
        const q = query.toLowerCase();
        const filtrados = todosCentros.filter(c =>
            (c.nombre      || '').toLowerCase().includes(q) ||
            (c.ciudad      || '').toLowerCase().includes(q) ||
            (c.descripcion || '').toLowerCase().includes(q)
        );
        renderCentros(filtrados);
    }

    function renderCentros(lista) {
        const container = document.getElementById('centrosContainer');
        if (!lista || lista.length === 0) {
            container.innerHTML = `
                <div class="card" style="text-align:center;color:var(--gray-500);padding:2rem">
                    No se encontraron centros con ese criterio de búsqueda.
                </div>`;
            return;
        }
        container.innerHTML = lista.map(c => `
            <div class="card" style="margin-bottom:1.5rem">
                <div style="display:flex;justify-content:space-between;
                            align-items:flex-start;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem">
                    <h3 style="color:var(--ocean-800);font-weight:700;font-size:1.1rem">
                        🏫 ${escapeHtml(c.nombre)}
                    </h3>
                    ${c.ciudad ? `
                    <span style="background:var(--ocean-100);color:var(--ocean-800);
                                 padding:.3rem .8rem;border-radius:20px;font-size:.85rem;
                                 font-weight:600;white-space:nowrap">
                        📍 ${escapeHtml(c.ciudad)}
                    </span>` : ''}
                </div>

                ${c.descripcion ? `
                <p style="color:var(--gray-600);font-size:.9rem;
                          margin-bottom:.75rem;line-height:1.6">
                    ${escapeHtml(c.descripcion)}
                </p>` : ''}

                <div style="display:flex;gap:1.5rem;flex-wrap:wrap;
                            font-size:.85rem;color:var(--gray-600);margin-bottom:1.25rem">
                    ${c.direccion ? `<span>📍 ${escapeHtml(c.direccion)}</span>` : ''}
                    ${c.telefono  ? `<span>📞 <a href="tel:${escapeHtml(c.telefono)}"
                                        style="color:var(--ocean-600);text-decoration:none">
                                        ${escapeHtml(c.telefono)}</a></span>` : ''}
                    ${c.email     ? `<span>✉️ <a href="mailto:${escapeHtml(c.email)}"
                                        style="color:var(--ocean-600);text-decoration:none">
                                        ${escapeHtml(c.email)}</a></span>` : ''}
                    ${c.sitioWeb  ? `<span>🌐 <a href="${escapeHtml(c.sitioWeb)}"
                                        target="_blank" rel="noopener"
                                        style="color:var(--ocean-600);text-decoration:none">
                                        Visitar web</a></span>` : ''}
                </div>

                <div style="display:flex;gap:.75rem;flex-wrap:wrap">
                    <button class="btn btn-primary btn-sm"
                        onclick="verInmersiones(${c.id}, '${escapeHtml(c.nombre)}')">
                        🤿 Ver Inmersiones
                    </button>
                </div>
            </div>`).join('');
    }

    function verInmersiones(centroId, nombreCentro) {
        window.location.href = `/pages/Inmersiones.html?centro=${centroId}`;
    }

    cargarCentros();
</script>
</body>
</html>
