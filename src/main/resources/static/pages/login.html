<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - DiveConnect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">

        <div class="auth-logo">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none"
                 stroke="var(--ocean-600)" stroke-width="2" stroke-linecap="round">
                <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
                <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
            <h1 class="auth-title">DiveConnect</h1>
            <p style="color:var(--gray-500)">Red social de submarinismo</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Usuario o Email</label>
                <input id="usernameOrEmail" class="form-input" type="text"
                       placeholder="usuario o correo@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input id="password" class="form-input" type="password"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary w-full">
                Iniciar Sesión
            </button>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta?
            <a href="/pages/register.html">Regístrate aquí</a>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
    redirectIfAuthenticated();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Iniciando sesión...';
        try {
            await login(
                document.getElementById('usernameOrEmail').value.trim(),
                document.getElementById('password').value
            );
            window.location.href = '/pages/feed.html';
        } catch (err) {
            showAlert(err.message || 'Usuario o contraseña incorrectos', 'error');
            btn.disabled = false;
            btn.textContent = 'Iniciar Sesión';
        }
    });
</script>
</body>
</html>
