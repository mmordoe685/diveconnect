<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - DiveConnect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="navbar" id="mainNavbar"></header>

<div class="container">

    <!-- Datos del perfil -->
    <div class="card" id="perfilCard">
        <div class="loading"><div class="spinner"></div></div>
    </div>

    <!-- Editar perfil -->
    <div class="card">
        <h3 style="color:var(--ocean-800);margin-bottom:1rem;font-weight:600">Editar Perfil</h3>
        <form id="editForm">
            <div class="form-group">
                <label class="form-label">Biografía</label>
                <textarea id="biografia" class="form-input" rows="3"
                    placeholder="Cuéntanos sobre tu experiencia..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Nivel de Certificación</label>
                <input id="nivel" class="form-input" type="text"
                    placeholder="Ej: Open Water, Advanced, Rescue Diver...">
            </div>
            <div class="form-group">
                <label class="form-label">Número de Inmersiones realizadas</label>
                <input id="numInmersiones" class="form-input" type="number" min="0" value="0">
            </div>
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        </form>
    </div>

    <!-- Mis publicaciones -->
    <h3 style="color:var(--ocean-800);margin-bottom:1rem;font-weight:600">Mis Publicaciones</h3>
    <div id="misPublicaciones">
        <div class="loading"><div class="spinner"></div></div>
    </div>

    <!-- Mis reservas -->
    <h3 style="color:var(--ocean-800);margin:2rem 0 1rem;font-weight:600">Mis Reservas</h3>
    <div id="misReservas">
        <div class="loading"><div class="spinner"></div></div>
    </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/publicaciones.js"></script>
<script>
    requireAuth(); initNav();

    // ── Cargar datos del perfil ──────────────────────────────────────────
    async function cargarPerfil() {
        const card = document.getElementById('perfilCard');
        try {
            const user = await fetchAPI('/usuarios/perfil');
            // Actualizar localStorage con datos frescos
            localStorage.setItem('user', JSON.stringify(user));

            card.innerHTML = `
                <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">
                    <div style="width:80px;height:80px;border-radius:50%;flex-shrink:0;
                        background:linear-gradient(135deg,var(--ocean-500),var(--ocean-700));
                        display:flex;align-items:center;justify-content:center;
                        font-size:2rem;color:white;font-weight:800;
                        box-shadow:0 4px 15px rgba(9,109,217,0.35)">
                        ${(user.username || '?').charAt(0).toUpperCase()}
                    </div>
                    <div style="flex:1;min-width:200px">
                        <h2 style="color:var(--ocean-800);font-weight:800;font-size:1.4rem;
                                   margin-bottom:.2rem">@${escapeHtml(user.username)}</h2>
                        ${user.email ? `
                        <p style="color:var(--gray-500);font-size:.9rem;margin-bottom:.3rem">
                            ✉️ ${escapeHtml(user.email)}</p>` : ''}
                        ${user.nivelCertificacion ? `
                        <p style="color:var(--ocean-600);font-weight:600;font-size:.9rem">
                            🏅 ${escapeHtml(user.nivelCertificacion)}</p>` : ''}
                        ${user.biografia ? `
                        <p style="color:var(--gray-700);margin-top:.5rem;font-size:.95rem;
                                  line-height:1.6">
                            ${escapeHtml(user.biografia)}</p>` : ''}
                    </div>
                </div>
                <div style="display:flex;gap:0;margin-top:1.5rem;
                            border-top:1px solid var(--gray-200);padding-top:1rem">
                    <div style="flex:1;text-align:center;
                                border-right:1px solid var(--gray-200)">
                        <div style="font-size:1.8rem;font-weight:800;color:var(--ocean-700)">
                            ${user.numeroPublicaciones || 0}</div>
                        <div style="color:var(--gray-500);font-size:.8rem;margin-top:.2rem">
                            Publicaciones</div>
                    </div>
                    <div style="flex:1;text-align:center;
                                border-right:1px solid var(--gray-200)">
                        <div style="font-size:1.8rem;font-weight:800;color:var(--ocean-700)">
                            ${user.numeroSeguidores || 0}</div>
                        <div style="color:var(--gray-500);font-size:.8rem;margin-top:.2rem">
                            Seguidores</div>
                    </div>
                    <div style="flex:1;text-align:center">
                        <div style="font-size:1.8rem;font-weight:800;color:var(--ocean-700)">
                            ${user.numeroInmersiones || 0}</div>
                        <div style="color:var(--gray-500);font-size:.8rem;margin-top:.2rem">
                            Inmersiones</div>
                    </div>
                </div>`;

            // Rellenar formulario de edición con datos actuales
            document.getElementById('biografia').value         = user.biografia         || '';
            document.getElementById('nivel').value             = user.nivelCertificacion || '';
            document.getElementById('numInmersiones').value    = user.numeroInmersiones  || 0;

        } catch (err) {
            card.innerHTML = `
                <div style="color:#c62828;padding:1rem">
                    ❌ Error al cargar el perfil: ${escapeHtml(err.message)}
                </div>`;
        }
    }

    // ── Cargar publicaciones del usuario ─────────────────────────────────
    async function cargarMisPublicaciones() {
        const container = document.getElementById('misPublicaciones');
        try {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!user.id) { container.innerHTML = ''; return; }

            const lista = await fetchAPI(`/publicaciones/usuario/${user.id}`);
            if (!lista || lista.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align:center;color:var(--gray-500);
                                            padding:2rem">
                        Todavía no has publicado ninguna inmersión. 
                        <a href="/pages/feed.html" style="color:var(--ocean-600)">
                            Ir al feed</a>
                    </div>`;
            } else {
                container.innerHTML = lista.map(p => renderPublicacion(p)).join('');
            }
        } catch (err) {
            container.innerHTML = `
                <div style="color:#c62828">Error: ${escapeHtml(err.message)}</div>`;
        }
    }

    // ── Cargar reservas del usuario ──────────────────────────────────────
    async function cargarMisReservas() {
        const container = document.getElementById('misReservas');
        try {
            const lista = await fetchAPI('/reservas/mis-reservas');
            if (!lista || lista.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align:center;color:var(--gray-500);
                                            padding:1.5rem">
                        No tienes reservas activas.
                        <a href="/pages/Inmersiones.html" style="color:var(--ocean-600)">
                            Ver inmersiones disponibles
                        </a>
                    </div>`;
                return;
            }
            const estados = {
                PENDIENTE:  { bg:'#fff8e1', text:'#e65100', label:'⏳ Pendiente'   },
                CONFIRMADA: { bg:'#e8f5e9', text:'#1b5e20', label:'✅ Confirmada'  },
                CANCELADA:  { bg:'#fce4ec', text:'#b71c1c', label:'❌ Cancelada'   },
                COMPLETADA: { bg:'#e3f2fd', text:'#0d47a1', label:'🏆 Completada'  }
            };
            container.innerHTML = lista.map(r => {
                const e = estados[r.estado] || estados.PENDIENTE;
                const fecha = r.fechaReserva
                    ? new Date(r.fechaReserva).toLocaleDateString('es-ES')
                    : '';
                return `
                <div class="card" style="margin-bottom:.75rem;
                    display:flex;justify-content:space-between;align-items:center;
                    flex-wrap:wrap;gap:.5rem">
                    <div>
                        <strong style="color:var(--ocean-800)">
                            🤿 ${escapeHtml(r.inmersionTitulo || 'Inmersión')}</strong>
                        <p style="color:var(--gray-500);font-size:.82rem;margin-top:.15rem">
                            ${fecha}
                            ${r.precioTotal != null
                                ? ` · <strong>${r.precioTotal.toFixed(2)}€</strong>`
                                : ''}
                        </p>
                    </div>
                    <span style="background:${e.bg};color:${e.text};padding:.3rem .75rem;
                        border-radius:20px;font-size:.8rem;font-weight:700;white-space:nowrap">
                        ${e.label}
                    </span>
                </div>`;
            }).join('');
        } catch (err) {
            container.innerHTML = `
                <div style="color:#c62828">Error: ${escapeHtml(err.message)}</div>`;
        }
    }

    // ── Guardar cambios de perfil ────────────────────────────────────────
    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.submitter || document.querySelector('#editForm button[type="submit"]');
        const textoOriginal = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Guardando...';
        try {
            await fetchAPI('/usuarios/perfil', {
                method: 'PUT',
                body: JSON.stringify({
                    biografia:          document.getElementById('biografia').value.trim()      || null,
                    nivelCertificacion: document.getElementById('nivel').value.trim()          || null,
                    numeroInmersiones:  parseInt(document.getElementById('numInmersiones').value, 10) || 0
                })
            });
            showAlert('✅ Perfil actualizado correctamente.', 'success');
            await cargarPerfil(); // Recargar para mostrar datos actualizados
        } catch (err) {
            showAlert('❌ ' + (err.message || 'Error al guardar los cambios.'), 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = textoOriginal;
        }
    });

    // ── Inicialización ───────────────────────────────────────────────────
    cargarPerfil();
    cargarMisPublicaciones();
    cargarMisReservas();
</script>
</body>
</html>
