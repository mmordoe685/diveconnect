<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — DiveConnect</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Profile Hero ───────────────────────────────────────── */
    .perfil-hero {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 2.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .perfil-hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(46,196,182,0.07), transparent 70%);
      pointer-events: none;
    }
    .perfil-hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,107,0.05), transparent 70%);
      pointer-events: none;
    }

    /* ── Top row: avatar + info ─────────────────────────────── */
    .perfil-top {
      display: flex;
      align-items: flex-start;
      gap: 1.75rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .perfil-avatar {
      width: 92px; height: 92px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--turquoise), #0E4D64);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.1rem; font-weight: 800;
      color: var(--bg-0);
      flex-shrink: 0;
      border: 3px solid rgba(46,196,182,0.28);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }
    .perfil-avatar img {
      width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
    }
    .perfil-info { flex: 1; min-width: 200px; }
    .perfil-username {
      font-family: 'DM Serif Display', serif;
      font-size: 1.55rem; font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text-0);
      margin-bottom: .3rem;
    }
    .perfil-tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .5rem; }
    .perfil-tag {
      display: inline-flex; align-items: center; gap: .3rem;
      background: rgba(46,196,182,0.1);
      border: 1px solid rgba(46,196,182,0.2);
      border-radius: var(--r-full);
      padding: .2rem .8rem;
      font-size: .75rem; font-weight: 600;
      color: var(--turquoise);
    }
    .perfil-email {
      font-size: .8rem;
      color: var(--text-2);
      margin-bottom: .4rem;
    }
    .perfil-bio {
      font-size: .875rem;
      color: var(--text-1);
      line-height: 1.65;
      max-width: 520px;
      margin: 0;
    }

    /* ── Stats bar ──────────────────────────────────────────── */
    .perfil-stats {
      display: flex;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      position: relative; z-index: 1;
    }
    .perfil-stat {
      flex: 1;
      text-align: center;
      border-right: 1px solid var(--border);
      padding: .25rem 0;
    }
    .perfil-stat:last-child { border-right: none; }
    .perfil-stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem; font-weight: 800;
      color: var(--turquoise);
      line-height: 1;
      margin-bottom: .2rem;
    }
    .perfil-stat-label {
      font-size: .72rem;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    /* ── Section labels ─────────────────────────────────────── */
    .section-label {
      font-family: 'DM Serif Display', serif;
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--turquoise);
      margin-bottom: 1rem;
    }

    /* ── Edit form card ─────────────────────────────────────── */
    .edit-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 1.75rem 2rem;
      margin-bottom: 1.5rem;
    }
    .edit-card-header {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: 1.25rem;
      padding-bottom: .9rem;
      border-bottom: 1px solid var(--border);
    }
    .edit-card-icon {
      width: 32px; height: 32px;
      background: rgba(46,196,182,0.1);
      border: 1px solid rgba(46,196,182,0.2);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem;
    }
    .edit-card-title {
      font-family: 'DM Serif Display', serif;
      font-size: .95rem; font-weight: 700;
      color: var(--text-0);
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 540px) {
      .form-grid-2 { grid-template-columns: 1fr; }
    }

    /* ── Reservations list ──────────────────────────────────── */
    .reserva-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .75rem;
      padding: .9rem 1.25rem;
      margin-bottom: .6rem;
      transition: border-color .18s, box-shadow .18s;
    }
    .reserva-row:hover {
      border-color: var(--border-h);
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }
    .reserva-titulo {
      font-weight: 700;
      color: var(--text-0);
      font-size: .9rem;
      margin-bottom: .15rem;
    }
    .reserva-meta {
      font-size: .76rem;
      color: var(--text-2);
    }
    .reserva-precio { color: var(--turquoise); font-weight: 700; }
    .estado-badge {
      padding: .25rem .8rem;
      border-radius: var(--r-full);
      font-size: .72rem; font-weight: 700;
      white-space: nowrap;
      letter-spacing: .03em;
    }
  </style>
</head>
<body>

<header class="navbar" id="mainNavbar"></header>

<div class="container" style="max-width:760px">

  <!-- ── Profile Hero ── -->
  <div class="perfil-hero" id="perfilHero">
    <div class="loading" style="color:var(--text-2)"><div class="spinner"></div></div>
  </div>

  <!-- ── Edit Form (solo en perfil propio) ── -->
  <div class="edit-card" id="editCard">
    <div class="edit-card-header">
      <div class="edit-card-icon">✏️</div>
      <div class="edit-card-title">Editar perfil</div>
    </div>
    <form id="editForm">
      <div class="form-group">
        <label class="form-label">Biografía</label>
        <textarea id="biografia" class="form-input" rows="3"
          placeholder="Cuéntanos sobre tu experiencia como buceador..."></textarea>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Nivel de Certificación</label>
          <input id="nivel" class="form-input" type="text" placeholder="Ej: Open Water, Advanced...">
        </div>
        <div class="form-group">
          <label class="form-label">Número de Inmersiones</label>
          <input id="numInmersiones" class="form-input" type="number" min="0" value="0">
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
    </form>
  </div>

  <!-- ── Publications ── -->
  <div class="section-label" style="margin-top:.25rem" id="publicacionesLabel">Mis publicaciones</div>
  <div id="misPublicaciones"><div class="loading"><div class="spinner"></div></div></div>

  <!-- ── Reservations (solo en perfil propio) ── -->
  <div class="section-label" style="margin-top:1.75rem" id="reservasLabel">Reservas recientes</div>
  <div id="misReservas"><div class="loading"><div class="spinner"></div></div></div>

</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/publicaciones.js"></script>
<script>
  requireAuth(); initNav();

  // ── Determina si viene ?id=... en la URL y si es otro usuario ─────
  const urlParams = new URLSearchParams(window.location.search);
  const paramId = urlParams.get('id');
  const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
  const verOtroUsuario = paramId && parseInt(paramId, 10) !== parseInt(currentUser.id, 10);
  const idAVer = verOtroUsuario ? parseInt(paramId, 10) : null;
  let perfilVisible = null; // usuario cargado (propio u otro)

  async function cargarPerfil() {
    const hero = document.getElementById('perfilHero');
    try {
      const user = verOtroUsuario
        ? await fetchAPI('/usuarios/' + idAVer)
        : await fetchAPI('/usuarios/perfil');
      if (!verOtroUsuario) localStorage.setItem('user', JSON.stringify(user));
      perfilVisible = user;

      const inicial = (user.username || '?').charAt(0).toUpperCase();
      const avatarHtml = user.fotoPerfil
        ? `<div class="perfil-avatar"><img src="${escapeHtml(user.fotoPerfil)}" alt="Avatar"
               onerror="this.parentElement.textContent='${inicial}'"></div>`
        : `<div class="perfil-avatar">${inicial}</div>`;

      const tipoLabel = {
        USUARIO_COMUN:  'Buceador',
        USUARIO_EMPRESA:'Empresa',
        ADMINISTRADOR:  'Administrador'
      }[user.tipoUsuario] || 'Buceador';

      // Nombre público (empresas priorizan nombreEmpresa)
      const nombrePublico = user.nombreEmpresa ? escapeHtml(user.nombreEmpresa) : ('@' + escapeHtml(user.username));

      // Slot para el botón "Seguir" — sólo si viene otro usuario
      const followBtnHtml = verOtroUsuario
        ? `<button id="followBtn" class="btn-follow seguir" type="button" style="margin-top:.75rem">Cargando…</button>`
        : '';

      hero.innerHTML = `
        <div class="perfil-top">
          ${avatarHtml}
          <div class="perfil-info">
            <div class="perfil-username">${nombrePublico}</div>
            <div class="perfil-tags">
              <span class="perfil-tag">${tipoLabel}</span>
              ${user.nivelCertificacion ? `<span class="perfil-tag">${escapeHtml(user.nivelCertificacion)}</span>` : ''}
            </div>
            ${user.email && !verOtroUsuario ? `<div class="perfil-email">${escapeHtml(user.email)}</div>` : ''}
            ${user.biografia ? `<p class="perfil-bio">${escapeHtml(user.biografia)}</p>` : ''}
            ${user.descripcionEmpresa ? `<p class="perfil-bio">${escapeHtml(user.descripcionEmpresa)}</p>` : ''}
            ${followBtnHtml}
          </div>
        </div>
        <div class="perfil-stats">
          <div class="perfil-stat">
            <div class="perfil-stat-num">${user.numeroPublicaciones || 0}</div>
            <div class="perfil-stat-label">Publicaciones</div>
          </div>
          <div class="perfil-stat">
            <div class="perfil-stat-num">${user.numeroSeguidores || 0}</div>
            <div class="perfil-stat-label">Seguidores</div>
          </div>
          <div class="perfil-stat">
            <div class="perfil-stat-num">${user.numeroSeguidos || user.numeroSiguiendo || 0}</div>
            <div class="perfil-stat-label">Siguiendo</div>
          </div>
          <div class="perfil-stat">
            <div class="perfil-stat-num">${user.numeroInmersiones || 0}</div>
            <div class="perfil-stat-label">Inmersiones</div>
          </div>
        </div>`;

      if (verOtroUsuario) {
        // Ocultar edit form y reservas — mostramos sólo publicaciones públicas
        document.getElementById('editCard').style.display = 'none';
        document.getElementById('reservasLabel').style.display = 'none';
        document.getElementById('misReservas').style.display = 'none';
        document.getElementById('publicacionesLabel').textContent = `Publicaciones de ${nombrePublico}`;
        // Cablear botón follow con 3 estados
        await wireFollowButton(user.id);
      } else {
        document.getElementById('biografia').value      = user.biografia          || '';
        document.getElementById('nivel').value          = user.nivelCertificacion || '';
        document.getElementById('numInmersiones').value = user.numeroInmersiones  || 0;
      }
    } catch (err) {
      hero.innerHTML = `<p style="color:var(--text-2);padding:1rem">
        Error al cargar el perfil: ${escapeHtml(err.message)}</p>`;
    }
  }

  // ── Follow button con 3 estados ─────────────────────────────────────
  async function wireFollowButton(userId) {
    const btn = document.getElementById('followBtn');
    if (!btn) return;
    try {
      const estado = await fetchAPI('/seguimiento/estado/' + userId);
      aplicarEstadoFollow(btn, estado && estado.estado);
    } catch {
      aplicarEstadoFollow(btn, 'NO_SIGUE');
    }
    btn.addEventListener('click', async () => {
      const estadoActual = btn.dataset.estado || 'NO_SIGUE';
      btn.disabled = true;
      const textoOriginal = btn.textContent;
      btn.textContent = '…';
      try {
        if (estadoActual === 'SIGUIENDO') {
          const res = await fetchAPI('/seguimiento/dejar/' + userId, { method: 'DELETE' });
          aplicarEstadoFollow(btn, res && res.estado);
          showAlert('Has dejado de seguir', 'info');
        } else if (estadoActual === 'NO_SIGUE' || estadoActual === 'SOLICITADO') {
          // SOLICITADO también re-solicita (idempotente a nivel de servicio)
          const res = await fetchAPI('/seguimiento/solicitar/' + userId, { method: 'POST' });
          aplicarEstadoFollow(btn, res && res.estado);
          if (res.estado === 'SIGUIENDO') showAlert('¡Ahora le sigues!', 'success');
          else if (res.estado === 'SOLICITADO') showAlert('Solicitud enviada', 'info');
        }
      } catch (err) {
        btn.textContent = textoOriginal;
        showAlert(err.message || 'Error', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  }

  function aplicarEstadoFollow(btn, estado) {
    estado = estado || 'NO_SIGUE';
    btn.dataset.estado = estado;
    btn.className = 'btn-follow';
    switch (estado) {
      case 'SIGUIENDO':
        btn.classList.add('siguiendo');
        btn.textContent = 'Siguiendo';
        break;
      case 'SOLICITADO':
        btn.classList.add('solicitado');
        btn.textContent = 'Solicitado';
        break;
      case 'PROPIO':
        btn.style.display = 'none';
        break;
      default:
        btn.classList.add('seguir');
        btn.textContent = 'Seguir';
    }
    btn.style.marginTop = '.75rem';
  }

  async function cargarMisPublicaciones() {
    const container = document.getElementById('misPublicaciones');
    try {
      let usuarioId;
      if (verOtroUsuario) {
        usuarioId = idAVer;
      } else {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        usuarioId = user.id;
      }
      if (!usuarioId) { container.innerHTML = ''; return; }
      const lista = await fetchAPI(`/publicaciones/usuario/${usuarioId}`);
      if (!lista || lista.length === 0) {
        container.innerHTML = `<div class="card" style="text-align:center;color:var(--text-2);padding:2rem">
          ${verOtroUsuario ? 'Este usuario aún no tiene publicaciones.' : `No has publicado nada todavía. <a href="/pages/feed.html" style="color:var(--turquoise)">Ir al feed</a>`}</div>`;
      } else {
        container.innerHTML = lista.map(p => renderPublicacion(p)).join('');
      }
    } catch (err) {
      container.innerHTML = `<div style="color:var(--coral)">Error: ${escapeHtml(err.message)}</div>`;
    }
  }

  async function cargarMisReservas() {
    const container = document.getElementById('misReservas');
    try {
      const lista = await fetchAPI('/reservas/mis-reservas');
      if (!lista || lista.length === 0) {
        container.innerHTML = `<div class="card" style="text-align:center;color:var(--text-2);padding:1.5rem">
          No tienes reservas. <a href="/pages/Inmersiones.html" style="color:var(--turquoise)">Ver inmersiones</a></div>`;
        return;
      }
      const estadoStyle = {
        PENDIENTE:  { background: 'rgba(255,209,102,0.12)', color: '#FFD166' },
        CONFIRMADA: { background: 'rgba(46,196,182,0.12)',  color: '#2EC4B6' },
        CANCELADA:  { background: 'rgba(255,107,107,0.12)', color: '#FF6B6B' },
        COMPLETADA: { background: 'rgba(100,180,255,0.12)', color: '#64B4FF' }
      };
      const recientes = lista.slice(0, 5);
      container.innerHTML = recientes.map(r => {
        const estilo = estadoStyle[r.estado] || estadoStyle.PENDIENTE;
        const fecha  = r.fechaReserva
          ? new Date(r.fechaReserva).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' })
          : '';
        const badgeStyle = `background:${estilo.background};color:${estilo.color};border:1px solid ${estilo.color}33`;
        return `
          <div class="reserva-row">
            <div>
              <div class="reserva-titulo">${escapeHtml(r.inmersionTitulo || 'Inmersión')}</div>
              <div class="reserva-meta">
                ${fecha}${r.precioTotal != null
                  ? ` &middot; <span class="reserva-precio">${r.precioTotal.toFixed(2)}&euro;</span>`
                  : ''}
              </div>
            </div>
            <span class="estado-badge" style="${badgeStyle}">${r.estado}</span>
          </div>`;
      }).join('') + (lista.length > 5
        ? `<div style="text-align:center;margin-top:.75rem">
             <a href="/pages/reservas.html" class="btn btn-secondary btn-sm">Ver todas (${lista.length})</a></div>`
        : '');
    } catch (err) {
      container.innerHTML = `<div style="color:var(--coral)">Error: ${escapeHtml(err.message)}</div>`;
    }
  }

  if (!verOtroUsuario) {
    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.submitter || document.querySelector('#editForm button[type="submit"]');
      const txt = btn.textContent;
      btn.disabled = true; btn.textContent = 'Guardando...';
      try {
        await fetchAPI('/usuarios/perfil', {
          method: 'PUT',
          body: JSON.stringify({
            biografia:          document.getElementById('biografia').value.trim() || null,
            nivelCertificacion: document.getElementById('nivel').value.trim() || null,
            numeroInmersiones:  parseInt(document.getElementById('numInmersiones').value, 10) || 0
          })
        });
        showAlert('Perfil actualizado correctamente.', 'success');
        await cargarPerfil();
      } catch (err) {
        showAlert(err.message || 'Error al guardar.', 'error');
      } finally { btn.disabled = false; btn.textContent = txt; }
    });
  }

  cargarPerfil();
  cargarMisPublicaciones();
  if (!verOtroUsuario) cargarMisReservas();
</script>
<script src="/js/animations.js"></script>
</body>
</html>
