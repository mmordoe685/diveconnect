<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed — DiveConnect</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ═══════════════════════════════════════════════════════════
       Feed Instagram-style (Oceano)
       ═══════════════════════════════════════════════════════════ */
    .feed-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }

    @media (max-width: 900px) {
      .feed-layout { grid-template-columns: 1fr; gap: 1.5rem; }
      .feed-sidebar { display: none; }
    }

    /* ── Stories row ─────────────────────────────────────────── */
    .stories-row {
      display: flex;
      gap: 1rem;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      margin-bottom: 1.75rem;
      scrollbar-width: none;
    }
    .stories-row::-webkit-scrollbar { display: none; }

    .story {
      flex: 0 0 auto;
      text-align: center;
      cursor: pointer;
    }

    .story-ring {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(from 180deg, #00D4AA, #5B5EA6, #F5A623, #FF6B6B, #00D4AA);
      margin: 0 auto 0.35rem;
      transition: transform .25s ease;
    }
    .story-ring:hover { transform: scale(1.06); }

    .story-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid var(--white);
    }

    .story-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-2);
      max-width: 72px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Compose card ────────────────────────────────────────── */
    .compose-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .compose-head {
      display: flex;
      gap: 0.85rem;
      align-items: flex-start;
    }

    .compose-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      flex: 0 0 44px;
      object-fit: cover;
      border: 2px solid var(--seafoam-soft, #B5EAD7);
    }

    .compose-textarea {
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      min-height: 50px;
      max-height: 200px;
      color: var(--text-1);
      outline: none;
    }

    .compose-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .compose-tools {
      display: flex;
      gap: 0.5rem;
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--text-2);
      transition: background .2s, color .2s;
    }
    .tool-btn:hover { background: var(--glass); color: var(--seafoam); }

    /* ── Post card Instagram-style ───────────────────────────── */
    .ig-post {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      margin-bottom: 1.75rem;
      overflow: hidden;
      opacity: 0;
      animation: fadeSlideUp .5s ease forwards;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ig-header {
      display: flex;
      align-items: center;
      padding: 0.85rem 1rem;
      gap: 0.75rem;
    }

    .ig-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      padding: 2px;
      background: conic-gradient(from 180deg, #00D4AA, #5B5EA6, #F5A623, #FF6B6B, #00D4AA);
    }

    .ig-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--white);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--indigo);
      font-weight: 700;
      font-size: 0.95rem;
    }

    .ig-avatar-inner img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .ig-meta { flex: 1; }
    .ig-username {
      font-weight: 700;
      font-size: 0.92rem;
      color: var(--text-1);
    }
    .ig-location {
      font-size: 0.75rem;
      color: var(--text-2);
    }

    .ig-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: linear-gradient(135deg, #00D4AA22, #5B5EA622);
      display: block;
    }

    .ig-actions {
      display: flex;
      align-items: center;
      padding: 0.6rem 1rem 0.4rem;
      gap: 1rem;
    }

    .ig-action {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-1);
      padding: 4px;
      display: grid;
      place-items: center;
      transition: transform .2s;
    }
    .ig-action:hover { transform: scale(1.12); }

    .ig-action.liked { color: var(--coral); }
    .ig-action.liked svg { fill: var(--coral); }

    .ig-bookmark { margin-left: auto; }

    .ig-likes {
      padding: 0 1rem;
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--text-1);
    }

    .ig-caption {
      padding: 0.4rem 1rem 0.2rem;
      font-size: 0.9rem;
      line-height: 1.4;
      color: var(--text-1);
      word-wrap: break-word;
    }

    .ig-caption .username {
      font-weight: 700;
      margin-right: 0.4rem;
    }

    .ig-diveinfo {
      margin: 0.6rem 1rem 0;
      padding: 0.7rem 0.85rem;
      background: linear-gradient(135deg, rgba(0,212,170,.08), rgba(91,94,166,.05));
      border: 1px solid rgba(0,212,170,.18);
      border-radius: 10px;
      font-size: 0.78rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 0.45rem;
    }

    .ig-diveinfo .chip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text-2);
    }
    .ig-diveinfo .chip strong {
      color: var(--seafoam-dark, #006E5F);
    }

    .ig-comments-count {
      padding: 0.3rem 1rem 0.2rem;
      font-size: 0.78rem;
      color: var(--text-2);
      cursor: pointer;
    }
    .ig-comments-count:hover { color: var(--seafoam); }

    .ig-time {
      padding: 0.2rem 1rem 0.9rem;
      font-size: 0.68rem;
      color: var(--text-3, #9ca3af);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .ig-comment-area {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: none;
    }
    .ig-comment-area.open { display: block; }

    .ig-comment-list {
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 0.6rem;
    }

    .ig-comment {
      padding: 0.4rem 0;
      font-size: 0.85rem;
      line-height: 1.35;
    }
    .ig-comment .username { font-weight: 700; margin-right: .4rem; color: var(--text-1); }
    .ig-comment .text     { color: var(--text-1); }
    .ig-comment .date     { display:block; font-size:.65rem; color: var(--text-3, #9ca3af); margin-top:.15rem; }

    .ig-comment-form {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .ig-comment-form input {
      flex: 1;
      border: none;
      background: var(--glass);
      border-radius: 20px;
      padding: 0.55rem 1rem;
      font-size: 0.85rem;
      outline: none;
      color: var(--text-1);
    }
    .ig-comment-form input:focus { background: var(--white); box-shadow: 0 0 0 2px var(--seafoam); }

    .ig-post-send {
      background: var(--seafoam);
      color: var(--white);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      cursor: pointer;
      flex: 0 0 32px;
    }

    .ig-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-2);
      padding: 4px;
    }
    .ig-delete:hover { color: var(--coral); }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .feed-sidebar {
      position: sticky;
      top: 100px;
      align-self: start;
    }

    .side-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .side-profile {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }
    .side-profile img {
      width: 56px; height: 56px;
      border-radius: 50%;
      object-fit: cover;
    }
    .side-profile .uname { font-weight: 700; color: var(--text-1); }
    .side-profile .role  { font-size: .78rem; color: var(--text-2); }

    .side-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-2);
      font-weight: 600;
      margin-bottom: 0.8rem;
    }

    .side-list-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.4rem 0;
      text-decoration: none;
      color: inherit;
    }
    .side-list-item img {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }
    .side-list-item .name { font-size: .85rem; font-weight: 600; color: var(--text-1); }
    .side-list-item .sub  { font-size: .7rem; color: var(--text-2); }

    /* Empty state */
    .empty-feed {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-2);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
    }
  </style>
</head>
<body>

<header class="navbar" id="mainNavbar"></header>

<div class="feed-layout">

  <!-- ═════════ COLUMNA PRINCIPAL ═════════ -->
  <main>

    <!-- Stories -->
    <div class="stories-row" id="storiesRow">
      <!-- populated by JS -->
    </div>

    <!-- Compose -->
    <div class="compose-card" data-reveal>
      <form id="nuevaPublicacionForm">
        <div class="compose-head">
          <img id="composeAvatar" class="compose-avatar" src="" alt="">
          <textarea id="contenido"
                    class="compose-textarea"
                    placeholder="¿Qué profundidades exploras hoy?"
                    rows="2" required></textarea>
        </div>

        <div id="detallesInmersion" class="hidden" style="margin:0.85rem 0 0; padding:.75rem; background:var(--glass); border-radius:12px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
            <input type="text" class="form-input" id="lugarInmersion" placeholder="Lugar (ej: Islas Medas)">
            <input type="text" class="form-input" id="especiesVistas" placeholder="Especies (ej: mero, pulpo)">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin-top:.5rem">
            <input type="number" step="0.1" class="form-input" id="profundidadMaxima" placeholder="Prof. (m)">
            <input type="number" step="0.1" class="form-input" id="temperaturaAgua" placeholder="Temp. (°C)">
            <input type="number" step="0.1" class="form-input" id="visibilidad" placeholder="Visib. (m)">
          </div>
        </div>

        <div class="compose-actions">
          <div class="compose-tools">
            <button type="button" class="tool-btn" title="Detalles de inmersión" onclick="toggleDetalles()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
              </svg>
            </button>
            <button type="button" class="tool-btn" title="Lugar">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
            </button>
          </div>
          <button type="submit" class="btn btn-primary btn-sm">Publicar</button>
        </div>
      </form>
    </div>

    <!-- Lista de publicaciones Instagram-style -->
    <div id="publicacionesContainer">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- ═════════ SIDEBAR ═════════ -->
  <aside class="feed-sidebar">
    <!-- Perfil del usuario activo -->
    <div class="side-card" id="sideProfileCard"></div>

    <!-- Sugerencias / empresas destacadas -->
    <div class="side-card">
      <div class="side-title">Centros destacados</div>
      <div id="sideEmpresas">
        <div class="loading"><div class="spinner" style="width:24px;height:24px"></div></div>
      </div>
    </div>

    <!-- Link al mapa -->
    <div class="side-card" style="background:linear-gradient(135deg, rgba(0,212,170,.12), rgba(91,94,166,.08))">
      <div class="side-title" style="color:var(--indigo)">Explora el mapa</div>
      <p style="font-size:.82rem;color:var(--text-2);margin-bottom:.7rem">
        Descubre los puntos submarinos documentados por centros de toda España.
      </p>
      <a href="/pages/mapa.html" class="btn btn-primary btn-sm" style="width:100%">
        Ver mapa interactivo →
      </a>
    </div>
  </aside>

</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/publicaciones.js"></script>
<script>
  requireAuth();
  initNav();

  const me = getCurrentUser();
  if (me) {
    const avatarUrl = me.fotoPerfil || `https://ui-avatars.com/api/?name=${encodeURIComponent(me.username)}&background=00D4AA&color=fff&size=100`;
    document.getElementById('composeAvatar').src = avatarUrl;

    const roleLabel = me.tipoUsuario === 'USUARIO_EMPRESA' ? 'Centro de buceo'
                    : me.tipoUsuario === 'ADMINISTRADOR'   ? 'Administrador'
                    : 'Buceador';
    document.getElementById('sideProfileCard').innerHTML = `
      <div class="side-profile">
        <img src="${avatarUrl}" alt="${me.username}">
        <div>
          <div class="uname">${escapeHtml(me.username)}</div>
          <div class="role">${roleLabel}</div>
        </div>
      </div>
      <a href="/pages/Perfil.html" class="btn btn-ghost btn-sm" style="width:100%;margin-top:.9rem">Mi perfil</a>
    `;
  }

  function toggleDetalles() {
    document.getElementById('detallesInmersion').classList.toggle('hidden');
  }

  // ═══════ Render estilo Instagram ═══════
  function renderIgPost(p) {
    const me = getCurrentUser();
    const esMia = me && me.id === p.usuarioId;
    const avatarInitial = (p.usuarioUsername || '?').charAt(0).toUpperCase();
    const likedClass = p.likedByCurrentUser ? ' liked' : '';

    const dateLabel = formatFecha(p.fechaPublicacion);

    const placeholderImg = `https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?w=800&q=80`;
    const mainImg = p.imagenUrl || (p.lugarInmersion ? placeholderImg : null);

    const diveInfoHtml = (p.lugarInmersion || p.profundidadMaxima || p.temperaturaAgua || p.visibilidad || p.especiesVistas) ? `
      <div class="ig-diveinfo">
        ${p.lugarInmersion    ? `<span class="chip"><strong>📍</strong> ${escapeHtml(p.lugarInmersion)}</span>` : ''}
        ${p.profundidadMaxima ? `<span class="chip"><strong>▼</strong> ${p.profundidadMaxima}m</span>` : ''}
        ${p.temperaturaAgua   ? `<span class="chip"><strong>🌡</strong> ${p.temperaturaAgua}°C</span>` : ''}
        ${p.visibilidad       ? `<span class="chip"><strong>👁</strong> ${p.visibilidad}m</span>` : ''}
        ${p.especiesVistas    ? `<span class="chip" style="grid-column:1/-1"><strong>🐠</strong> ${escapeHtml(p.especiesVistas)}</span>` : ''}
      </div>` : '';

    return `
      <article class="ig-post" id="pub-${p.id}">
        <header class="ig-header">
          <div class="ig-avatar"><div class="ig-avatar-inner">${avatarInitial}</div></div>
          <div class="ig-meta">
            <div class="ig-username">${escapeHtml(p.usuarioUsername)}</div>
            ${p.lugarInmersion ? `<div class="ig-location">${escapeHtml(p.lugarInmersion)}</div>` : ''}
          </div>
          ${esMia ? `<button class="ig-delete" onclick="handleDeletePublicacion(${p.id})" title="Eliminar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
            </svg>
          </button>` : ''}
        </header>

        ${mainImg ? `<img class="ig-image" src="${escapeHtml(mainImg)}" alt="post image" loading="lazy">` : ''}

        <div class="ig-actions">
          <button class="ig-action${likedClass}" id="btn-like-${p.id}" onclick="handleLike(${p.id}, ${p.likedByCurrentUser || false})">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="${p.likedByCurrentUser ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
          <button class="ig-action" onclick="toggleComentarios(${p.id})">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
          <button class="ig-action" title="Compartir">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
          </button>
          <button class="ig-action ig-bookmark" title="Guardar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </div>

        <div class="ig-likes"><span id="likes-count-${p.id}">${p.numeroLikes || 0}</span> me gusta</div>

        <div class="ig-caption">
          <span class="username">${escapeHtml(p.usuarioUsername)}</span>${escapeHtml(p.contenido)}
        </div>

        ${diveInfoHtml}

        ${(p.numeroComentarios || 0) > 0 ? `
          <div class="ig-comments-count" onclick="toggleComentarios(${p.id})" id="coms-count-${p.id}">
            Ver los ${p.numeroComentarios} comentarios
          </div>` : `<div id="coms-count-${p.id}" style="display:none"></div>`}

        <div class="ig-time">${dateLabel}</div>

        <div class="ig-comment-area" id="comentarios-${p.id}">
          <div class="ig-comment-list" id="comentarios-list-${p.id}"></div>
          <form class="ig-comment-form" onsubmit="event.preventDefault(); handleComentario(${p.id});">
            <input type="text" id="comentario-input-${p.id}" placeholder="Añade un comentario..." maxlength="500">
            <button type="submit" class="ig-post-send" title="Enviar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </form>
        </div>
      </article>`;
  }

  // Override renderPublicacion global para que use el nuevo estilo
  window.renderPublicacion = renderIgPost;

  // Override renderComentarios para estilo Instagram
  window.renderComentarios = function(publicacionId, lista) {
    const listDiv = document.getElementById(`comentarios-list-${publicacionId}`);
    if (!listDiv) return;
    if (!lista || lista.length === 0) {
      listDiv.innerHTML = '<p style="color:var(--text-3,#9ca3af);font-size:.8rem;padding:.4rem 0">Sé el primero en comentar ✨</p>';
      return;
    }
    listDiv.innerHTML = lista.map(c => `
      <div class="ig-comment">
        <span class="username">${escapeHtml(c.usuarioUsername)}</span><span class="text">${escapeHtml(c.contenido)}</span>
        <span class="date">${formatFecha(c.fechaComentario)}</span>
      </div>`).join('');
  };

  // ═══════ Stories (centros activos) ═══════
  async function loadStories() {
    const row = document.getElementById('storiesRow');
    try {
      const empresas = await fetchAPI('/usuarios/empresas').catch(() => []);
      const items = (empresas || []).slice(0, 10);
      if (items.length === 0) {
        row.style.display = 'none';
        return;
      }
      row.innerHTML = items.map(e => {
        const name = e.nombreEmpresa || e.username;
        const img  = e.fotoPerfil || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=00D4AA&color=fff&size=100`;
        return `
          <div class="story" onclick="location.href='/pages/Perfil.html?u=${encodeURIComponent(e.username)}'">
            <div class="story-ring"><img src="${img}" alt="${escapeHtml(name)}"></div>
            <div class="story-label">${escapeHtml(name)}</div>
          </div>`;
      }).join('');
    } catch (e) {
      row.style.display = 'none';
    }
  }

  // ═══════ Sidebar: empresas destacadas ═══════
  async function loadSideEmpresas() {
    const c = document.getElementById('sideEmpresas');
    try {
      const empresas = await fetchAPI('/usuarios/empresas').catch(() => []);
      if (!empresas || empresas.length === 0) {
        c.innerHTML = '<p style="font-size:.78rem;color:var(--text-2)">Aún no hay centros publicados.</p>';
        return;
      }
      c.innerHTML = empresas.slice(0, 4).map(e => {
        const name = e.nombreEmpresa || e.username;
        const img  = e.fotoPerfil || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=5B5EA6&color=fff&size=80`;
        return `
          <a class="side-list-item" href="/pages/Perfil.html?u=${encodeURIComponent(e.username)}">
            <img src="${img}" alt="">
            <div style="flex:1;min-width:0">
              <div class="name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(name)}</div>
              <div class="sub">${escapeHtml(e.direccion || 'Centro de buceo')}</div>
            </div>
          </a>`;
      }).join('');
    } catch (e) {
      c.innerHTML = '<p style="font-size:.78rem;color:var(--text-2)">Error al cargar.</p>';
    }
  }

  // ═══════ Feed loader ═══════
  async function loadFeed() {
    const container = document.getElementById('publicacionesContainer');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const lista = await getFeed();
      if (!lista || lista.length === 0) {
        container.innerHTML = `
          <div class="empty-feed">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" style="opacity:.35;margin:0 auto 1rem;display:block">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <p style="font-weight:600;color:var(--text-1);margin-bottom:.35rem;font-size:1.05rem">Tu feed está tranquilo</p>
            <p style="font-size:.9rem">Sé el primero en compartir tu inmersión o sigue a algún buceador.</p>
          </div>`;
      } else {
        container.innerHTML = lista.map(renderIgPost).join('');
      }
    } catch (err) {
      container.innerHTML = `<div class="empty-feed" style="color:var(--coral)">Error: ${escapeHtml(err.message)}</div>`;
    }
  }

  document.getElementById('nuevaPublicacionForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      contenido:         document.getElementById('contenido').value.trim(),
      lugarInmersion:    document.getElementById('lugarInmersion').value.trim() || null,
      profundidadMaxima: parseFloat(document.getElementById('profundidadMaxima').value) || null,
      temperaturaAgua:   parseFloat(document.getElementById('temperaturaAgua').value) || null,
      visibilidad:       parseFloat(document.getElementById('visibilidad').value) || null,
      especiesVistas:    document.getElementById('especiesVistas').value.trim() || null,
    };
    if (!data.contenido) { showAlert('Escribe algo antes de publicar', 'error'); return; }
    try {
      await createPublicacion(data);
      showAlert('¡Publicación compartida!', 'success');
      document.getElementById('nuevaPublicacionForm').reset();
      document.getElementById('detallesInmersion').classList.add('hidden');
      await loadFeed();
    } catch (err) {
      showAlert(err.message || 'Error al publicar', 'error');
    }
  });

  // Init
  loadStories();
  loadSideEmpresas();
  loadFeed();
</script>
<script src="/js/animations.js"></script>
</body>
</html>
