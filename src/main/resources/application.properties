# ══════════════════════════════════════
# SERVIDOR
# ══════════════════════════════════════
server.port=8080
spring.application.name=DiveConnect

# ══════════════════════════════════════
# MYSQL
# ══════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/diveconnect_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:diveconnect_user}
spring.datasource.password=${DB_PASSWORD:DiveConnect2025!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ══════════════════════════════════════
# JPA / HIBERNATE
# ══════════════════════════════════════
# update = Actualiza esquema sin borrar datos (ideal para desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ══════════════════════════════════════
# MULTIPART (subida de archivos)
# ══════════════════════════════════════
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ══════════════════════════════════════
# LOGGING
# ══════════════════════════════════════
logging.level.org.springframework.web=INFO
logging.level.com.diveconnect=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ══════════════════════════════════════
# JWT
# ══════════════════════════════════════
# IMPORTANTE: Cambia este secret en producción (mínimo 32 caracteres)
jwt.secret=${JWT_SECRET:DiveConnect2025SecretKeyForJWTTokenGenerationMustBeLongEnoughToBeSecure}
# 86400000 ms = 24 horas
jwt.expiration=86400000

# ══════════════════════════════════════
# ARCHIVOS SUBIDOS
# ══════════════════════════════════════
file.upload-dir=uploads

# ══════════════════════════════════════
# OPENWEATHERMAP (tiempo atmosférico)
# Registro gratis: https://openweathermap.org/api
# ══════════════════════════════════════
openweather.api-key=${OPENWEATHER_API_KEY:}
openweather.base-url=https://api.openweathermap.org/data/2.5

# ══════════════════════════════════════
# STRIPE (pagos)
# Obtener claves test: https://dashboard.stripe.com/test/apikeys
# ══════════════════════════════════════
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.currency=eur

# ══════════════════════════════════════
# GOOGLE OAUTH2 (Sign-In)
# Consola: https://console.cloud.google.com/apis/credentials
# Usa placeholder por defecto; al iniciar con credenciales reales
# (env GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET), el login real funciona.
# ══════════════════════════════════════
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled-placeholder-client-id.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled-placeholder-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Indica si Google OAuth2 está realmente habilitado (ignora si placeholder)
app.google-oauth-enabled=${GOOGLE_OAUTH_ENABLED:false}

# URL del frontend (para redirecciones tras OAuth2)
app.frontend-url=${FRONTEND_URL:http://localhost:8080}